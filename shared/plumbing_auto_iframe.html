<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RFDS Plumbing Auto (GoJS v3 iframe)</title>
  <script src="./release/go.js"></script>
  <script src="./extensions/AvoidsLinksRouter.js"></script>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
    }

    #root {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #myDiagramDiv {
      width: 100%;
      height: 100%;
      background-color: #f8f9fa;
      border: 0;
    }

    #overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      pointer-events: none;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #pill {
      pointer-events: none;
      /* Force strong contrast so the status pill is readable even if parent/theme styles leak in */
      background: rgba(13, 37, 64, 0.92); /* dark blue */
      border: 1px solid rgba(10, 37, 64, 0.55);
      color: #ffffff;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      max-width: 60vw;
      overflow: hidden;
      text-overflow: ellipsis;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
    }

    /* Optional semantic states (auto-detected in setPill) */
    #pill.automated {
      background: rgba(25, 135, 84, 0.92); /* green */
      border-color: rgba(25, 135, 84, 0.55);
      color: #ffffff;
    }

    #pill.edited {
      background: rgba(255, 193, 7, 0.92); /* amber */
      border-color: rgba(255, 193, 7, 0.70);
      color: #1f2d3d; /* dark text on light bg */
    }

    #pill.error {
      background: rgba(220, 53, 69, 0.12);
      border-color: rgba(220, 53, 69, 0.25);
      color: #721c24;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="overlay">
      <div id="pill">Initializing…</div>
    </div>
    <div id="myDiagramDiv"></div>
  </div>

  <script>
    // ------------------------------
    // Plumbing Auto iframe renderer
    // ------------------------------
    // Parent ↔ iframe protocol
    // Parent → iframe:
    //  - { action: "INIT", apiBaseUrl?, allowCrossOrigin? }
    //  - { action: "GENERATE", projectNumber?, preferences?, projectData?, content?, requestPayload?, sectorKey? }
    //  - { action: "SWITCH_SECTOR", sectorKey }
    //  - { action: "SET_LEGEND_VISIBLE", visible: boolean }
    //  - { action: "GET_MODEL_JSON" }
    //  - { action: "SET_MODEL_JSON", modelJson }
    //  - { action: "ZOOM_TO_FIT" }
    //  - { action: "SET_EDIT_MODE", enabled: boolean }
    //  - { action: "UNDO" }
    //  - { action: "REDO" }
    //  - { action: "EXPORT_IMAGE_BLOB", format: "png"|"jpeg", background?, scale? }
    //  - { action: "EXPORT_SVG", background?, scale? }
    //
    // Iframe → parent:
    //  - { action: "READY" }
    //  - { action: "STATUS", message }
    //  - { action: "ERROR", message, stack? }
    //  - { action: "GENERATED", availableSectors, sectorKey, projectNumber? }
    //  - { action: "MODEL_JSON", modelJson, sectorKey? }
    //  - { action: "EDIT_MODE_SET", requestId, enabled }
    //  - { action: "UNDO_RESULT", requestId, didUndo, canUndo, canRedo }
    //  - { action: "REDO_RESULT", requestId, didRedo, canUndo, canRedo }
    //  - { action: "EXPORTED_IMAGE_BLOB", requestId, mimeType, bytesBase64, format }
    //  - { action: "EXPORTED_SVG", requestId, svgString }

    /* global go, AvoidsLinksRouter */
    let myDiagram;
    let myRouter; // AvoidsLinksRouter instance
    let originalRequestPayload = null; // Used for location inference fallback (BBU/shelter)
    let lastParsedResult = null; // { sectorDiagrams, summary, ... }
    let currentSectorKey = null;
    let apiBaseUrl = "http://127.0.0.1:8000";
    let allowedParentOrigin = null;
    let allowCrossOrigin = false;
    const PLUMBING_AUTO_IFRAME_SOURCE = "RFDS_PLUMBING_AUTO_IFRAME";

    // Request sequencing to ignore stale responses
    let generateSeq = 0;

    // Legend (in-diagram, not HTML overlay)
    let legendPart = null;
    let legendVisible = true;
    const legendState = { kind: null, key: null }; // kind: "band" | "connectionType"
    const legendItemRefs = []; // { kind, key, rootPanel, accentShape }

    const SECTOR_NAME_MAP = {
      A: "Alpha",
      B: "Beta",
      C: "Gamma",
      D: "Delta",
      E: "Epsilon",
      F: "Zeta",
      G: "Eta",
      H: "Theta",
      I: "Iota",
      J: "Kappa"
    };

    const SINGLE_SECTOR_LABEL_KEY = "__SINGLE_SECTOR_LABEL__";
    const SINGLE_SECTOR_LABEL_Y_GAP = 180;

    function setPill(text, isError) {
      const pill = document.getElementById("pill");
      if (!pill) return;
      pill.textContent = text;
      // Keep pill readable and allow simple "Automated"/"Edited" styling based on the text.
      // This is resilient even if the parent sets the label text via postMessage.
      const t = String(text || "").toLowerCase();
      if (isError) {
        pill.className = "error";
      } else if (t.indexOf("edited") !== -1) {
        pill.className = "edited";
      } else if (t.indexOf("automated") !== -1) {
        pill.className = "automated";
      } else {
        pill.className = "";
      }
    }

    function postToParent(msg) {
      try {
        // If we learned an origin from the parent, target it; otherwise broadcast.
        const targetOrigin = allowedParentOrigin || "*";
        window.parent && window.parent.postMessage({ source: PLUMBING_AUTO_IFRAME_SOURCE, ...msg }, targetOrigin);
      } catch (e) {
        // Swallow: postMessage failures shouldn't kill the renderer.
        console.warn("postToParent failed", e);
      }
    }

    function status(message) {
      console.log("[plumbing_iframe] STATUS:", message);
      setPill(message, false);
      postToParent({ action: "STATUS", message });
    }

    function error(message, err) {
      console.error("[plumbing_iframe] ERROR:", message, err);
      setPill(message, true);
      postToParent({
        action: "ERROR",
        message: String(message || "Unknown error"),
        stack: err && err.stack ? String(err.stack) : undefined
      });
    }

    function isAllowedMessage(evt) {
      // We expect same-origin iframe in RFDS. However, for local dev / file://, evt.origin may be "null".
      if (allowCrossOrigin) return true;
      if (allowedParentOrigin) return evt.origin === allowedParentOrigin;
      if (window.location.protocol === "file:" || evt.origin === "null") return true;
      return evt.origin === window.location.origin;
    }

    function init() {
      const $ = go.GraphObject.make;

      myDiagram = new go.Diagram("myDiagramDiv", {
        "undoManager.isEnabled": true,
        "layout": $(go.LayeredDigraphLayout, {
          direction: 90,
          layerSpacing: 180,
          columnSpacing: 50,
          packOption: go.LayeredDigraphLayout.PackExpand,
          setsPortSpots: false
        }),
        "allowMove": true,
        "allowSelect": true,
        "allowDragOut": true,
        "allowDrop": true,
        "allowLink": true,
        "allowResize": true
      });

      myDiagram.model = new go.GraphLinksModel([], []);
      myDiagram.model.linkFromPortIdProperty = "fromPort";
      myDiagram.model.linkToPortIdProperty = "toPort";
      // Ensure undo is enabled even after (future) model swaps.
      ensureUndoEnabled();

      // Clear legend-based highlights only on true background clicks.
      // Improved event handling to prevent clearing when clicking on legend
      myDiagram.addDiagramListener("BackgroundSingleClicked", function(e) {
        console.log('[iframe] Background click detected - event details:', {
          subject: !!e.subject,
          targetObject: !!e.targetObject, 
          targetPart: !!e.targetPart,
          targetPartType: e.targetPart ? e.targetPart.constructor.name : 'none'
        });
        
        // Check if click was on the legend part
        const clickedOnLegend = e.targetPart === legendPart || 
                               (e.targetPart && e.targetPart.part === legendPart) ||
                               (e.targetObject && e.targetObject.part === legendPart);
        
        // Only clear if this is truly a background click (no target elements) and NOT on legend
        if (!e.subject && !e.targetObject && !e.targetPart && !clickedOnLegend) {
          console.log('[iframe] Clearing legend selection on true background click');
          clearLegendSelection();
        } else {
          console.log('[iframe] Not a true background click or clicked on legend - preserving legend selection');
        }
      });

      // Prevent clearing legend selection when clicking on diagram objects (nodes, links)
      myDiagram.addDiagramListener("ObjectSingleClicked", function(e) {
        console.log('[iframe] Object click detected - preserving legend selection');
        // Don't clear legend selection when clicking on diagram objects
        // Just let the legend selection remain as is
      });

      // Keep legend positioned after each layout completion (prevents legend sitting at 0,0 over the diagram).
      myDiagram.addDiagramListener("LayoutCompleted", function() {
        try { scheduleLegendPositioning(); } catch (e) {}
      });

      // Also reposition legend when diagram bounds or scale changes
      myDiagram.addDiagramListener("ViewportBoundsChanged", function() {
        try { 
          if (legendPositioned && legendPart && legendPart.visible) {
            scheduleLegendPositioning(); 
          }
        } catch (e) {}
      });

      // Reposition legend when model changes
      myDiagram.addModelChangedListener(function(evt) {
        if (evt.isTransactionFinished) {
          try { scheduleLegendPositioning(); } catch (e) {}
        }
      });

      myDiagram.toolManager.linkingTool.isEnabled = true;
      myDiagram.toolManager.relinkingTool.isEnabled = true;
      myDiagram.toolManager.linkingTool.direction = go.LinkingTool.Either;

      if (!myRouter) {
        myRouter = new AvoidsLinksRouter({
          linkSpacing: 20,
          avoidsNodes: true,
          iterations: 2,
          epsilonDistance: 0.5
        });
      }
      myDiagram.routers.add(myRouter);

      myDiagram.toolManager.linkingTool.isValidLink = function(fromnode, fromport, tonode, toport) {
        return fromnode !== tonode;
      };

      myDiagram.toolManager.linkingTool.insertLink = function(fromnode, fromport, tonode, toport) {
        const newlink = go.LinkingTool.prototype.insertLink.call(this, fromnode, fromport, tonode, toport);
        if (newlink && fromport && toport) {
          myDiagram.model.setDataProperty(newlink.data, "fromPort", fromport.portId);
          myDiagram.model.setDataProperty(newlink.data, "toPort", toport.portId);
        }
        return newlink;
      };

      // Default link template; routing strategy can replace it later.
      myDiagram.linkTemplate =
        $(go.Link,
          {
            routing: go.Link.AvoidsNodes,
            corner: 10,
            curve: go.Link.JumpOver,
            reshapable: false,
            resegmentable: false,
            adjusting: go.Link.End,
            smoothness: 1.5,
            curviness: 20,
            fromSpot: go.Spot.Default,
            toSpot: go.Spot.Default,
            mouseEnter: function(e, link) {
              const shape = link.findObject("LINKSHAPE");
              if (shape) shape.strokeWidth = Math.max(8, getLinkBaseStrokeWidth(link));
            },
            mouseLeave: function(e, link) {
              const shape = link.findObject("LINKSHAPE");
              if (shape) shape.strokeWidth = getLinkBaseStrokeWidth(link);
            }
          },
          $(go.Shape,
            { name: "LINKSHAPE", strokeWidth: 2, stroke: "#333" },
            new go.Binding("stroke", "color"),
            new go.Binding("strokeWidth", "thickness", function(t) {
              const n = Number(t);
              return (isFinite(n) && n > 0) ? n : 2;
            })
          ),
          $(go.TextBlock,
            {
              font: "10px sans-serif",
              stroke: "black",
              background: "white",
              segmentIndex: 0,
              segmentFraction: 0.5,
              visible: false
            },
            new go.Binding("text", "label"),
            new go.Binding("visible", "showLabel")
          )
        );

      myDiagram.nodeTemplateMap.add("separator",
        $(go.Node, "Vertical",
          {
            movable: false,
            selectable: false,
            locationSpot: go.Spot.Center,
            layerName: "Background",
            avoidable: false,
            minSize: new go.Size(0, 0),
            maxSize: new go.Size(Infinity, 50)
          },
          new go.Binding("location", "loc", go.Point.parse),
          $(go.TextBlock,
            {
              text: "Tower",
              font: "bold 16px sans-serif",
              stroke: "#000000",
              background: "transparent",
              margin: new go.Margin(0, 20, 5, 0),
              alignment: go.Spot.TopRight,
              pickable: false
            }
          ),
          $(go.Shape, "LineH",
            {
              strokeWidth: 3,
              stroke: "#000000",
              strokeDashArray: [12, 8],
              width: 2000,
              height: 0,
              pickable: false
            },
            // Allow width override (used by ALL view global separator). Defaults to 2000 for single-sector.
            new go.Binding("width", "width", function(w) {
              const n = Number(w);
              return (isFinite(n) && n > 0) ? n : 2000;
            })
          ),
          $(go.TextBlock,
            {
              text: "Shelter",
              font: "bold 16px sans-serif",
              stroke: "#000000",
              background: "transparent",
              margin: new go.Margin(5, 20, 0, 0),
              alignment: go.Spot.BottomRight,
              pickable: false
            }
          )
        )
      );

      // Sector label (for ALL mode)
      myDiagram.nodeTemplateMap.add("sectorLabel",
        $(go.Node, "Spot",
          {
            movable: false,
            selectable: false,
            pickable: false,
            isLayoutPositioned: false,
            locationSpot: go.Spot.Center,
            layerName: "Foreground",
            avoidable: false
          },
          new go.Binding("location", "loc", go.Point.parse),
          $(go.Panel, "Auto",
            $(go.Shape, "RoundedRectangle",
              {
                fill: "rgba(255,255,255,0.92)",
                stroke: "rgba(0,0,0,0.25)",
                strokeWidth: 1
              }
            ),
            $(go.TextBlock,
              {
                margin: new go.Margin(10, 18, 10, 18),
                font: "bold 32px sans-serif",
                stroke: "#111",
                wrap: go.TextBlock.WrapFit,
                maxLines: 2,
                textAlign: "center"
              },
              new go.Binding("text", "text")
            )
          )
        )
      );

      // Vertical dotted separator between sectors (for ALL mode)
      myDiagram.nodeTemplateMap.add("sectorDivider",
        $(go.Node, "Spot",
          {
            movable: false,
            selectable: false,
            pickable: false,
            locationSpot: go.Spot.Center,
            layerName: "Background",
            avoidable: false
          },
          new go.Binding("location", "loc", go.Point.parse),
          $(go.Shape, "LineV",
            {
              stroke: "rgba(0,0,0,0.65)",
              strokeWidth: 4,
              strokeDashArray: [12, 8],
              width: 2
            },
            new go.Binding("height", "height")
          )
        )
      );

      myDiagram.nodeTemplate =
        $(go.Node, "Spot",
          {
            movable: true,
            selectable: true,
            locationSpot: go.Spot.Center,
            dragComputation: function(node, pt, gridpt) {
              return new go.Point(pt.x, node.location.y);
            }
          },
          new go.Binding("location", "loc", go.Point.parse).makeTwoWay(go.Point.stringify),
          $(go.Panel, "Auto",
            $(go.Shape, "RoundedRectangle",
              {
                name: "NODESHAPE",
                fill: "#e1f5fe",
                stroke: "#01579b",
                strokeWidth: 2,
                minSize: new go.Size(120, 60)
              },
              new go.Binding("fill", "color"),
              new go.Binding("minSize", "", function(data) {
                const leftCount = (data.leftArray || []).length;
                const rightCount = (data.rightArray || []).length;
                const topCount = (data.topArray || []).length;
                const bottomCount = (data.bottomArray || []).length;

                const maxHorizontalPorts = Math.max(topCount, bottomCount);
                const minWidthFromPorts = maxHorizontalPorts > 0 ? maxHorizontalPorts * 26 + 20 : 0;
                const minWidth = Math.max(120, minWidthFromPorts);

                const maxVerticalPorts = Math.max(leftCount, rightCount);
                const minHeightFromPorts = maxVerticalPorts > 0 ? maxVerticalPorts * 18 + 20 : 0;
                const minHeight = Math.max(60, minHeightFromPorts);

                return new go.Size(minWidth, minHeight);
              })
            ),
            $(go.TextBlock,
              {
                margin: 10,
                font: "bold 16px sans-serif",
                textAlign: "center",
                wrap: go.TextBlock.WrapFit,
                maxLines: 3
              },
              new go.Binding("text", "name")
            )
          ),
           // Antenna mount position label (e.g. "1L", "1R") shown only for antenna nodes.
          // NOTE: This must appear AFTER the main "Auto" panel so the Spot panel sizing
          // is driven by the node body, not the label.
          $(go.TextBlock,
            {
              name: "ANTENNA_POSITION_LABEL",
              alignment: go.Spot.Top,
              alignmentFocus: go.Spot.Bottom,
              font: "bold 12px sans-serif",
              stroke: "#111",
              background: "rgba(255,255,255,0.85)",
              textAlign: "center",
              margin: new go.Margin(0, 4, 6, 4),
              visible: false,
              pickable: false
            },
            new go.Binding("text", "", function(d) {
              const v = (d && (d.position ?? d.antennaPosition ?? d.mountPosition)) ?? "";
              const pos = String(v || "").trim();
              return pos ? ("Position " + pos) : "";
            }),
            new go.Binding("visible", "", function(d) {
              if (!d) return false;
              if (String(d.category || "") !== "antenna") return false;
              const v = (d.position ?? d.antennaPosition ?? d.mountPosition);
              return String(v || "").trim().length > 0;
            })
          ),
          $(go.Panel, "Vertical",
            {
              alignment: go.Spot.Left,
              alignmentFocus: go.Spot.Center,
              margin: new go.Margin(0, 0, 0, -1)
            },
            new go.Binding("itemArray", "leftArray"),
            {
              itemTemplate:
                $(go.Panel, "Spot",
                  {
                    fromSpot: go.Spot.Left,
                    toSpot: go.Spot.Left,
                    fromLinkable: true,
                    toLinkable: true,
                    fromLinkableDuplicates: true,
                    toLinkableDuplicates: true,
                    fromLinkableSelfNode: false,
                    toLinkableSelfNode: false,
                    margin: 2
                  },
                  new go.Binding("portId", "portId"),
                  $(go.Shape, "Rectangle",
                    {
                      fill: "white",
                      stroke: "black",
                      strokeWidth: 1,
                      width: 20,
                      height: 12,
                      cursor: "pointer"
                    }
                  ),
                  $(go.TextBlock,
                    {
                      font: "7px sans-serif",
                      stroke: "black",
                      textAlign: "center",
                      verticalAlignment: go.Spot.Center,
                      margin: 1,
                      maxLines: 1,
                      overflow: go.TextBlock.OverflowEllipsis
                    },
                    new go.Binding("text", "", function(data) {
                      return data.displayLabel || data.label || "";
                    })
                  )
                )
            }
          ),
          $(go.Panel, "Vertical",
            {
              alignment: go.Spot.Right,
              alignmentFocus: go.Spot.Center,
              margin: new go.Margin(0, -2, 0, 0)
            },
            new go.Binding("itemArray", "rightArray"),
            {
              itemTemplate:
                $(go.Panel, "Spot",
                  {
                    fromSpot: go.Spot.Right,
                    toSpot: go.Spot.Right,
                    fromLinkable: true,
                    toLinkable: true,
                    fromLinkableDuplicates: true,
                    toLinkableDuplicates: true,
                    fromLinkableSelfNode: false,
                    toLinkableSelfNode: false,
                    margin: 2
                  },
                  new go.Binding("portId", "portId"),
                  $(go.Shape, "Rectangle",
                    {
                      fill: "white",
                      stroke: "black",
                      strokeWidth: 1,
                      width: 20,
                      height: 12,
                      cursor: "pointer"
                    }
                  ),
                  $(go.TextBlock,
                    {
                      font: "7px sans-serif",
                      stroke: "black",
                      textAlign: "center",
                      verticalAlignment: go.Spot.Center,
                      margin: 1,
                      maxLines: 1,
                      overflow: go.TextBlock.OverflowEllipsis
                    },
                    new go.Binding("text", "", function(data) {
                      return data.displayLabel || data.label || "";
                    })
                  )
                )
            }
          ),
          $(go.Panel, "Horizontal",
            {
              alignment: go.Spot.Top,
              alignmentFocus: go.Spot.Center,
              margin: new go.Margin(-1, 0, 0, 0)
            },
            new go.Binding("itemArray", "topArray"),
            {
              itemTemplate:
                $(go.Panel, "Spot",
                  {
                    fromSpot: go.Spot.Top,
                    toSpot: go.Spot.Top,
                    fromLinkable: true,
                    toLinkable: true,
                    fromLinkableDuplicates: true,
                    toLinkableDuplicates: true,
                    fromLinkableSelfNode: false,
                    toLinkableSelfNode: false,
                    margin: 2
                  },
                  new go.Binding("portId", "portId"),
                  $(go.Shape, "Rectangle",
                    {
                      fill: "white",
                      stroke: "black",
                      strokeWidth: 1,
                      width: 20,
                      height: 12,
                      cursor: "pointer"
                    }
                  ),
                  $(go.TextBlock,
                    {
                      font: "7px sans-serif",
                      stroke: "black",
                      textAlign: "center",
                      verticalAlignment: go.Spot.Center,
                      margin: 1,
                      maxLines: 1,
                      overflow: go.TextBlock.OverflowEllipsis
                    },
                    new go.Binding("text", "", function(data) {
                      return data.displayLabel || data.label || "";
                    })
                  )
                )
            }
          ),
          $(go.Panel, "Horizontal",
            {
              alignment: go.Spot.Bottom,
              alignmentFocus: go.Spot.Center,
              margin: new go.Margin(0, 0, -1, 0)
            },
            new go.Binding("itemArray", "bottomArray"),
            {
              itemTemplate:
                $(go.Panel, "Spot",
                  {
                    fromSpot: go.Spot.Bottom,
                    toSpot: go.Spot.Bottom,
                    fromLinkable: true,
                    toLinkable: true,
                    fromLinkableDuplicates: true,
                    toLinkableDuplicates: true,
                    fromLinkableSelfNode: false,
                    toLinkableSelfNode: false,
                    margin: 2
                  },
                  new go.Binding("portId", "portId"),
                  $(go.Shape, "Rectangle",
                    {
                      fill: "white",
                      stroke: "black",
                      strokeWidth: 1,
                      width: 20,
                      height: 12,
                      cursor: "pointer"
                    }
                  ),
                  $(go.TextBlock,
                    {
                      font: "7px sans-serif",
                      stroke: "black",
                      textAlign: "center",
                      verticalAlignment: go.Spot.Center,
                      margin: 1,
                      maxLines: 1,
                      overflow: go.TextBlock.OverflowEllipsis
                    },
                    new go.Binding("text", "", function(data) {
                      return data.displayLabel || data.label || "";
                    })
                  )
                )
            }
          )
        );

      myDiagram.addDiagramListener("LayoutCompleted", function() {
        // Order matters:
        // - Position legend (and reserve right-side fixedBounds) before zoomToFit so the legend never overlaps
        //   and the documentBounds/fixedBounds are stable for export.
        try { upsertSingleSectorLabel(currentSectorKey); } catch (e) {}
        try { scheduleLegendPositioning(); } catch (e) {}
        try { myDiagram.zoomToFit(); } catch (e) {}
        try { markExportReadyIfPossible(); } catch (e) {}
      });

      myDiagram.addDiagramListener("SelectionMoved", function(e) {
        // Preserve manual horizontal positioning: do not auto-relayout.
      });

      // Legend Part lives outside the model so it survives model resets.
      buildLegendPart();
    }

    // ------------------------------
    // Legend (in-diagram) + link highlighting
    // ------------------------------

    // Colors/labels reflect the GoJS "modern legend" used in `rfds/js/rfdsServiceAuto.js` (createBaseTemplateAuto).
    // NOTE: keys are used for matching; we normalize during matching so spacing/parentheses differences are OK.
    const LEGEND_FREQUENCY_BANDS = [
      { key: "700/850 (LB)", label: "700/850 (LB)", color: "black", strokeWidth: 3 },
      { key: "700 (LT)", label: "700 (LT)", color: "purple", strokeWidth: 3 },
      { key: "850 (CB)", label: "850 (CB)", color: "red", strokeWidth: 3 },
      { key: "AWS (AW)", label: "AWS (AW)", color: "brown", strokeWidth: 3 },
      { key: "PCS (PC)", label: "PCS (PC)", color: "green", strokeWidth: 3 },
      { key: "AWS/PCS (HB)", label: "AWS/PCS (HB)", color: "blue", strokeWidth: 3 },
      { key: "28GHz (U28)", label: "28GHz (U28)", color: "#b19cd9", strokeWidth: 3 },
      { key: "39GHz (U39)", label: "39GHz (U39)", color: "#90ee90", strokeWidth: 3 },
      { key: "L-Sub6 (S6)", label: "L-Sub6 (S6)", color: "#b5651d", strokeWidth: 3 },
      { key: "CBRS (RS)", label: "CBRS (RS)", color: "#3498db", strokeWidth: 4 },
      { key: "LAA (LA)", label: "LAA (LA)", color: "#7f8c8d", strokeWidth: 4 },
      { key: "Fiber", label: "Fiber", color: "orange", strokeWidth: 3 },
      { key: "AISG", label: "AISG", color: "#3498db", strokeWidth: 4 },
      { key: "DC", label: "DC", color: "#e91e63", strokeWidth: 4 }
    ];

    const LEGEND_CONNECTION_TYPES = [
      { key: "Coax", label: "Coax" },
      { key: "Coax Jumper", label: "Coax Jumper" },
      { key: "Sectors Shared Equipments", label: "Sectors Shared Equipments" },
      { key: "Enable Terminal Load", label: "Enable Terminal Load" }
    ];

    function normalizeLegendKey(s) {
      return String(s || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[()]/g, "")
        .replace(/[-_]/g, "");
    }

    function normalizeColorString(s) {
      return String(s || "").trim().toLowerCase();
    }

    function getSelectedBandColorByKey(bandKey) {
      const target = normalizeLegendKey(bandKey);
      if (!target) return null;
      for (const b of LEGEND_FREQUENCY_BANDS) {
        if (normalizeLegendKey(b.key) === target) return b.color;
      }
      return null;
    }

    function getLinkBaseStrokeWidth(link) {
      const t = Number(link && link.data ? link.data.thickness : 2);
      const base = (isFinite(t) && t > 0) ? t : 2;
      if (link && link.isHighlighted) return Math.max(base + 4, 6);
      return base;
    }

    function clearLegendSelection() {
      if (!myDiagram) return;
      console.log('[iframe] clearLegendSelection called');
      legendState.kind = null;
      legendState.key = null;
      updateLegendSelectionUI();
      updateLegendHighlights();
    }

    function setLegendSelection(kind, key) {
      if (!myDiagram) return;
      console.log(`[iframe] setLegendSelection called: ${kind}, ${key}`);
      const k = String(key || "");
      const isSame = legendState.kind === kind && legendState.key === k;
      legendState.kind = isSame ? null : kind;
      legendState.key = isSame ? null : k;
      console.log(`[iframe] Legend state updated: kind=${legendState.kind}, key=${legendState.key}`);
      updateLegendSelectionUI();
      updateLegendHighlights();
    }

    function updateLegendSelectionUI() {
      const selectedKind = legendState.kind;
      const selectedKey = legendState.key;
      for (const ref of legendItemRefs) {
        const isSelected = !!selectedKind && !!selectedKey && ref.kind === selectedKind && ref.key === selectedKey;
        if (ref.rootPanel) ref.rootPanel.background = isSelected ? "rgba(205,4,11,0.10)" : "transparent";
        if (ref.accentShape) {
          ref.accentShape.stroke = isSelected ? "#CD040B" : "rgba(0,0,0,0.15)";
          ref.accentShape.strokeWidth = isSelected ? 2 : 1;
        }
      }
    }

    function isBandMatchForLink(link, legendKey, legendColor) {
      if (!link || !link.data) return false;
      const target = normalizeLegendKey(legendKey);
      if (!target) return false;

      const sb = normalizeLegendKey(link.data.sourceBand);
      const tb = normalizeLegendKey(link.data.targetBand);
      if (sb && (sb === target || sb.indexOf(target) !== -1 || target.indexOf(sb) !== -1)) return true;
      if (tb && (tb === target || tb.indexOf(target) !== -1 || target.indexOf(tb) !== -1)) return true;

      // Fallback: match by color when bands are missing/blank.
      const lc = normalizeColorString(legendColor);
      const dc = normalizeColorString(link.data.color);
      if (lc && dc && dc === lc) return true;

      return false;
    }

    function isConnectionTypeMatchForLink(link, legendKey) {
      if (!link || !link.data) return false;
      const target = normalizeLegendKey(legendKey);
      if (!target) return false;
      const ct = normalizeLegendKey(link.data.connectionType);
      if (!ct) return false;
      return ct === target || ct.indexOf(target) !== -1 || target.indexOf(ct) !== -1;
    }

    function updateLegendHighlights() {
      // Link highlighting functionality has been removed.
      // Legend selection is now purely for visual feedback on the legend itself.
      if (!myDiagram) return;
      console.log(`[iframe] updateLegendHighlights: link highlighting disabled`);
    }

    function computeContentBoundsExcludingLegend() {
      if (!myDiagram) return null;
      if (!legendPart) return myDiagram.documentBounds;
      
      // Calculate bounds that include the full visual extent of nodes (including ports)
      let minX = Number.MAX_VALUE;
      let maxX = Number.MIN_VALUE;
      let minY = Number.MAX_VALUE;
      let maxY = Number.MIN_VALUE;
      let hasContent = false;

      myDiagram.nodes.each(function(node) {
        if (node === legendPart) return; // Skip the legend itself
        
        // Ensure node bounds are calculated
        node.ensureBounds();
        const nodeBounds = node.actualBounds;
        
        if (nodeBounds && isFinite(nodeBounds.x) && isFinite(nodeBounds.y) && 
            isFinite(nodeBounds.width) && isFinite(nodeBounds.height)) {
          
          // Add extra padding for ports that extend beyond the node visual bounds
          // Ports are typically 20px wide and positioned slightly outside the node
          const portPadding = 25; // Extra padding to account for port visual extent
          
          minX = Math.min(minX, nodeBounds.x - portPadding);
          maxX = Math.max(maxX, nodeBounds.x + nodeBounds.width + portPadding);
          minY = Math.min(minY, nodeBounds.y - portPadding);
          maxY = Math.max(maxY, nodeBounds.y + nodeBounds.height + portPadding);
          hasContent = true;
        }
      });

      // Also include links in the bounds calculation
      myDiagram.links.each(function(link) {
        if (!link) return;
        
        link.ensureBounds();
        const linkBounds = link.actualBounds;
        
        if (linkBounds && isFinite(linkBounds.x) && isFinite(linkBounds.y) && 
            isFinite(linkBounds.width) && isFinite(linkBounds.height)) {
          minX = Math.min(minX, linkBounds.x);
          maxX = Math.max(maxX, linkBounds.x + linkBounds.width);
          minY = Math.min(minY, linkBounds.y);
          maxY = Math.max(maxY, linkBounds.y + linkBounds.height);
          hasContent = true;
        }
      });

      // Include other parts (separators, labels, etc.) but exclude legend
      myDiagram.parts.each(function(part) {
        if (part === legendPart) return; // Skip the legend itself
        
        part.ensureBounds();
        const partBounds = part.actualBounds;
        
        if (partBounds && isFinite(partBounds.x) && isFinite(partBounds.y) && 
            isFinite(partBounds.width) && isFinite(partBounds.height)) {
          minX = Math.min(minX, partBounds.x);
          maxX = Math.max(maxX, partBounds.x + partBounds.width);
          minY = Math.min(minY, partBounds.y);
          maxY = Math.max(maxY, partBounds.y + partBounds.height);
          hasContent = true;
        }
      });

      if (!hasContent) {
        return null;
      }

      const bounds = new go.Rect(minX, minY, maxX - minX, maxY - minY);
      console.log(`[iframe] Content bounds (with port padding): ${bounds.width}x${bounds.height} at (${bounds.x}, ${bounds.y})`);
      return bounds;
    }

    function positionLegendPart() {
      if (!myDiagram || !legendPart || !legendPart.visible) return;
      myDiagram.invalidateDocumentBounds();
      const b = computeContentBoundsExcludingLegend();
      
      // If no content bounds yet, position legend far to the right to avoid overlap
      if (!b || !isFinite(b.width) || !isFinite(b.height) || b.width <= 0 || b.height <= 0) {
        // Position legend at a safe location far right to avoid overlapping with content being loaded
        legendPart.location = new go.Point(1200, 50);
        return;
      }

      // Reserve a "sidebar" area to the right of the content and place the legend inside it.
      // This prevents the legend from overlapping the diagram content, while keeping it in-diagram for exports.
      legendPart.ensureBounds();
      const lb = legendPart.actualBounds;
      if (!lb || !isFinite(lb.width) || !isFinite(lb.height) || lb.width <= 0 || lb.height <= 0) return;

      // Increased margin to ensure proper separation from rightmost nodes with ports
      const margin = 60; // Increased from 40 to provide more buffer
      const sidebarPad = 20;
      const fixedW = b.width + margin + lb.width + sidebarPad;
      const fixedH = Math.max(b.height, lb.height);

      // fixedBounds defines the scrollable/document region even if the layout doesn't naturally create space.
      myDiagram.fixedBounds = new go.Rect(b.x, b.y, fixedW, fixedH);

      // Place legend at the top of the reserved right area with additional clearance
      const legendX = b.x + b.width + margin;
      const legendY = Math.max(b.y, 50); // Ensure minimum top padding
      legendPart.location = new go.Point(legendX, legendY);

      // Mark that the legend has been positioned and fixedBounds reserved.
      legendPositioned = true;
      console.log(`[iframe] Legend positioned at (${legendX}, ${legendY}), content bounds: ${b.width}x${b.height}, rightmost content at: ${b.x + b.width}`);
      
      // Ensure documentBounds sees the latest legend/fixedBounds changes before export.
      try { myDiagram.invalidateDocumentBounds(); } catch (e) {}
      try { myDiagram.requestUpdate(); } catch (e) {}
      try { markExportReadyIfPossible(); } catch (e) {}
    }

    function scheduleLegendPositioning() {
      if (!myDiagram) return;
      // Layout/model updates can take multiple ticks; keep trying briefly until bounds are valid.
      const maxAttempts = 30; // Increased attempts
      const delayMs = 100; // Reduced delay for faster positioning
      let attempts = 0;

      const attempt = () => {
        attempts++;
        try {
          if (!myDiagram || !legendPart || !legendPart.visible) return;
          myDiagram.invalidateDocumentBounds();
          
          // Always try positioning even if bounds aren't perfect yet
          positionLegendPart();
          
          // Check if positioning was successful
          const b = computeContentBoundsExcludingLegend();
          const hasValidBounds = !!(b && isFinite(b.width) && isFinite(b.height) && b.width > 0 && b.height > 0);
          
          if (hasValidBounds && legendPositioned) {
            console.log(`[iframe] Legend positioning completed after ${attempts} attempts`);
            try { markExportReadyIfPossible(); } catch (e) {}
            return;
          }
        } catch (e) {
          console.warn(`[iframe] Legend positioning attempt ${attempts} failed:`, e);
        }

        if (attempts < maxAttempts) {
          setTimeout(attempt, delayMs);
        } else {
          console.warn(`[iframe] Legend positioning exhausted ${maxAttempts} attempts, positioning legend at safe fallback location`);
          // Final fallback: ensure legend is positioned somewhere safe
          if (legendPart) {
            legendPart.location = new go.Point(1200, 50);
            legendPositioned = true;
            try { markExportReadyIfPossible(); } catch (e) {}
          }
        }
      };

      setTimeout(attempt, 0);
    }

    function setLegendVisible(visible) {
      legendVisible = !!visible;
      if (!myDiagram || !legendPart) return;
      
      legendPart.visible = legendVisible;
      
      // If hidden, release reserved bounds so zoom/fit behaves normally.
      if (!legendVisible) {
        try { myDiagram.fixedBounds = null; } catch (e) {}
        legendPositioned = false;
      }
      // If showing, we must re-position and re-reserve bounds.
      if (legendVisible) {
        legendPositioned = false;
        // Position immediately to avoid flash at 0,0
        if (!legendPositioned) {
          legendPart.location = new go.Point(1200, 50);
        }
        // Then schedule proper positioning
        scheduleLegendPositioning();
      }
    }

    function buildLegendPart() {
      if (!myDiagram || legendPart) return;
      const $ = go.GraphObject.make;

      legendItemRefs.length = 0;

      // "Modern legend" visuals (ported from rfdsServiceAuto.js createBaseTemplateAuto),
      // but scaled down to work well as a right-side sidebar legend in the iframe.

      const SECTION_HEADER_H = 36;

      function registerSelectableRow(kind, key, rootPanel, accentShape) {

      function makeModernBandRow(kind, key, label, color, strokeWidth) {

          stroke: color,

          fill: "transparent",
          desiredSize: new go.Size(44, 0),
          height: 0
        });

        const swatchCard =
          $(go.Panel, "Auto",
            { margin: new go.Margin(0, 10, 0, 0), width: 60, height: 18 },

            $(go.Panel, "Spot",

              $(go.Panel, "Auto",
                { alignment: go.Spot.Center },

        const row =

                obj.background = "rgba(0,0,0,0.04)";

      function makeModernTypeRow(kind, key, label, fill, stroke) {

                obj.background = "transparent";
              },
              stretch: go.GraphObject.Horizontal,
              margin: new go.Margin(3, 0, 3, 0)

      function makeSectionHeader(text) {

            stroke: "#243b53",

            stroke: "white",
            font: "700 12px 'Segoe UI', Arial, sans-serif",
            margin: new go.Margin(5, 10, 5, 10)
          })
        );
      }

      const header =
        $(go.Panel, "Auto",
          { stretch: go.GraphObject.Horizontal },
          $(go.Shape, "RoundedRectangle", {
            fill: $(go.Brush, "Linear", { 0: "#0d3b66", 1: "#1a5490" }),
            stroke: "#0a2540",
            strokeWidth: 1,
            parameter1: 10
          }),
          $(go.Panel, "Vertical",
            { margin: 10, stretch: go.GraphObject.Horizontal },
            $(go.TextBlock, {
              text: "LEGENDS",
              stroke: "white",
              font: "800 14px 'Segoe UI', Arial, sans-serif",
              margin: new go.Margin(0, 0, 8, 0)
            }),
            $(go.Panel, "Horizontal",
              { alignment: go.Spot.Left },
              $(go.Shape, "RoundedRectangle", {
                fill: "#2ecc71",
                stroke: "#27ae60",
                strokeWidth: 1,
                desiredSize: new go.Size(14, 14),
                parameter1: 4,
                margin: new go.Margin(0, 8, 0, 0)
              }),
              $(go.TextBlock, {
                text: "RET DC Signal Capable Port",
                stroke: "white",
                font: "600 12px 'Segoe UI', Arial, sans-serif"
              })
            )
          )
        );

      const bandsPanel = $(go.Panel, "Vertical", { stretch: go.GraphObject.Horizontal });
      for (const b of LEGEND_FREQUENCY_BANDS) {
        bandsPanel.add(makeModernBandRow("band", b.key, b.label, b.color, b.strokeWidth));
      }

      const typesPanel = $(go.Panel, "Vertical", { stretch: go.GraphObject.Horizontal });
      for (const t of LEGEND_CONNECTION_TYPES) {
        const norm = normalizeLegendKey(t.key);
        if (norm === normalizeLegendKey("Coax")) typesPanel.add(makeModernTypeRow("connectionType", t.key, t.label, "transparent", "blue"));
        else if (norm === normalizeLegendKey("CoaxJumper")) typesPanel.add(makeModernTypeRow("connectionType", t.key, t.label, "blue", "blue"));
        else if (norm.indexOf(normalizeLegendKey("SectorsShared")) !== -1) typesPanel.add(makeModernTypeRow("connectionType", t.key, t.label, "#00d9ff", "#00b8d4"));
        else if (norm.indexOf(normalizeLegendKey("EnableTerminalLoad")) !== -1) typesPanel.add(makeModernTypeRow("connectionType", t.key, t.label, "white", "#e74c3c"));
        else typesPanel.add(makeModernTypeRow("connectionType", t.key, t.label, "transparent", "#334e68"));
      }

      const notesCard =
        $(go.Panel, "Auto",
          { margin: new go.Margin(12, 0, 0, 0), stretch: go.GraphObject.Horizontal },
          $(go.Shape, "RoundedRectangle", {
            fill: $(go.Brush, "Linear", { 0: "#e3f2fd", 1: "#90caf9" }),
            stroke: "#1976d2",

          }),
          $(go.Panel, "Vertical",
            { margin: 10, stretch: go.GraphObject.Horizontal },
            $(go.TextBlock, {
              text: "NOTES",
              stroke: "#0d47a1",
              font: "800 13px 'Segoe UI', Arial, sans-serif",
              margin: new go.Margin(0, 0, 6, 0)
            }),
            $(go.TextBlock, {
              text:
                "• Antenna view is from the back of the antennas\n" +
                "• Colors of connections are for clarification only\n" +
                "• Object sizes in drawing do not reflect true dimensions",
              stroke: "#334e68",
              font: "12px 'Segoe UI', Arial, sans-serif",
              wrap: go.TextBlock.WrapFit,
              width: LEGEND_WIDTH - 40
            })
          )
        );

      legendPart =
        $(go.Part, "Auto",
          {
            layerName: "Foreground",
            selectable: false,
            movable: false,
            pickable: true,
            locationSpot: go.Spot.TopLeft,
            location: new go.Point(1200, 50), // Start positioned far right to avoid initial overlap
            visible: legendVisible
          },
          $(go.Shape, "RoundedRectangle",
            {
              fill: $(go.Brush, "Linear", { 0: "#f0f4f8", 1: "#d9e2ec" }),
              stroke: "#334e68",
              strokeWidth: 1,
              parameter1: 12
            }
          ),
          $(go.Panel, "Vertical",
            { margin: 10, width: LEGEND_WIDTH, stretch: go.GraphObject.Horizontal },
            header,
            makeSectionHeader("FREQUENCY BANDS"),
            bandsPanel,
            makeSectionHeader("CONNECTION TYPES"),
            typesPanel,
            notesCard
          )
        );

      myDiagram.add(legendPart);
      updateLegendSelectionUI();
      updateLegendHighlights();
      
      // Immediate positioning attempt
      try {
        positionLegendPart();
      } catch (e) {
        console.warn('[iframe] Immediate legend positioning failed, will retry:', e);
      }
      
      // Schedule positioning with retry logic
      scheduleLegendPositioning();
      
      // Also schedule additional positioning after a longer delay as fallback
      setTimeout(() => {
        try {
          if (!legendPositioned) {
            console.log('[iframe] Fallback legend positioning attempt');
            scheduleLegendPositioning();
          }
        } catch (e) {}
      }, 1000);
    }

    // ------------------------------
    // Editing / undo / export helpers
    // ------------------------------
    let _diagramEditDefaults = null;

    // GoJS note:
    // Assigning a new model (`myDiagram.model = ...`) resets undo enablement because a new Model's UndoManager
    // defaults to disabled. This breaks UNDO/REDO in iframe edit mode unless we re-enable it after each swap.
    function ensureUndoEnabled() {
      try {
        if (myDiagram && myDiagram.undoManager) myDiagram.undoManager.isEnabled = true;
      } catch (e) {}
      try {
        if (myDiagram && myDiagram.model && myDiagram.model.undoManager) {
          myDiagram.model.undoManager.isEnabled = true;
        }
      } catch (e) {}
    }

    // Export readiness gate:
    // In this iframe, the legend part exists immediately (outside the model), while the main diagram content
    // is loaded + laid out asynchronously (multiple setTimeouts). If we export too early we can end up
    // exporting only the legend. We gate exports on "non-zero documentBounds with real model content".
    let exportReady = false;
    let legendPositioned = false;
    const exportReadyWaiters = [];

    function markExportReadyIfPossible() {
      if (!myDiagram || !myDiagram.model) return;
      const nodes = myDiagram.model.nodeDataArray || [];
      if (!nodes.length) return;

      // If the legend is visible, require legend positioning before allowing export.
      // This guarantees fixedBounds is reserved and documentBounds include the legend sidebar region.
      if (legendVisible && legendPart && legendPart.visible && !legendPositioned) return;

      myDiagram.invalidateDocumentBounds();
      const b = myDiagram.documentBounds;
      if (!b || !isFinite(b.width) || !isFinite(b.height) || b.width <= 0 || b.height <= 0) return;

      exportReady = true;
      while (exportReadyWaiters.length) {
        const fn = exportReadyWaiters.shift();
        try { fn(); } catch (e) {}
      }
    }

    function resetExportReady() {
      exportReady = false;
      legendPositioned = false;
      // Do not clear waiters: they should resolve when ready or timeout.
      // (Clearing could hang parent-side downloads.)
    }

    function waitForExportReady(timeoutMs) {
      // Large ALL-sector diagrams can take a while to layout+route; be patient by default.
      const ms = (typeof timeoutMs === "number" && isFinite(timeoutMs) && timeoutMs > 0) ? timeoutMs : 60000;
      if (exportReady) return Promise.resolve();

      return new Promise((resolve) => {
        let done = false;
        const t = setTimeout(() => {
          if (done) return;
          done = true;
          // Best-effort fallback: do not block forever, but try to make bounds stable before export.
          try { positionLegendPart(); } catch (e) {}
          try { myDiagram && myDiagram.invalidateDocumentBounds(); } catch (e) {}
          resolve();
        }, ms);

        exportReadyWaiters.push(() => {
          if (done) return;
          done = true;
          clearTimeout(t);
          resolve();
        });
      });
    }

    function applyEditMode(enabled) {
      if (!myDiagram) throw new Error("Diagram not initialized");
      const on = !!enabled;

      // Cache original per-diagram edit flags once.

    function exportImageDataUrl(opts) {
      if (!myDiagram) throw new Error("Diagram not initialized");
      const format = (opts && opts.format === "jpeg") ? "jpeg" : "png";
      const mimeType = format === "jpeg" ? "image/jpeg" : "image/png";

      // - If scale is omitted, GoJS defaults to `diagram.scale` (current zoom), which makes exports viewport/zoom dependent.

      const DEFAULT_EXPORT_SCALE = 2;
      const requestedScale = (opts && typeof opts.scale === "number" && isFinite(opts.scale) && opts.scale > 0)
        ? opts.scale
        : DEFAULT_EXPORT_SCALE;
      const background = (opts && typeof opts.background === "string") ? opts.background : undefined;

      // Export the full diagram, not just the current viewport.
      // By omitting `position`/`size`, GoJS exports the full documentBounds automatically (zoom/pan independent).
      // Best-effort: ensure legend is placed and fixedBounds reserved before measurement/export.
      try { positionLegendPart(); } catch (e) {}
      myDiagram.invalidateDocumentBounds();
      const b = myDiagram.documentBounds;
      const pad = 20; // used only for scale calculation (optional breathing room)
      const exportBounds = (b && isFinite(b.width) && isFinite(b.height) && b.width > 0 && b.height > 0)
        ? new go.Rect(b.x - pad, b.y - pad, b.width + (pad * 2), b.height + (pad * 2))
        : null;

      // Prevent partial/cropped exports on huge diagrams by clamping the output pixel size.
      // Browsers/GPU drivers have max canvas dimensions; exceeding them can silently truncate output.
      // Keep the payload reasonably sized for postMessage (base64) and avoid GPU/canvas limits.
      // Full diagram will still be included; scale is clamped down as needed.
      const MAX_SIDE_PX = 8192;        // conservative cross-browser max dimension (faster + safer)
      const MAX_AREA_PX = 25_000_000;  // ~25 MP cap to avoid huge base64 messages/timeouts

      let scale = requestedScale;
      if (exportBounds) {
        const w = exportBounds.width;
        const h = exportBounds.height;
        if (isFinite(w) && isFinite(h) && w > 0 && h > 0) {
          const capBySide = Math.min(MAX_SIDE_PX / w, MAX_SIDE_PX / h);
          const capByArea = Math.sqrt(MAX_AREA_PX / (w * h));

          scale = Math.min(scale, capBySide, capByArea);
          if (!isFinite(scale) || scale <= 0) scale = 0.1;

      // GoJS returns a data URL string by default. We stick to data URLs to keep this portable.
      const dataUrl = myDiagram.makeImageData({
        type: mimeType,
        scale: scale,
        background: background,
        maxSize: new go.Size(MAX_SIDE_PX, MAX_SIDE_PX)
      });

      const requestedScale = (opts && typeof opts.scale === "number" && isFinite(opts.scale) && opts.scale > 0)
        ? opts.scale
        : DEFAULT_EXPORT_SCALE;
      const background = (opts && typeof opts.background === "string") ? opts.background : undefined;

      myDiagram.invalidateDocumentBounds();

        ? new go.Rect(b.x - pad, b.y - pad, b.width + (pad * 2), b.height + (pad * 2))

    // Layout / routing logic (ported)

    function enforceAntennaBottomLayer() {
      if (!myDiagram || !myDiagram.model) return;

      const shelterNodes = [];
      const towerNodes = [];
      const antennaNodes = [];
      const separatorNodes = [];

      myDiagram.nodes.each(function(node) {
        if (node.data.category === "separator") separatorNodes.push(node);
        else if (node.data.category === "antenna") antennaNodes.push(node);
        else if (node.data.location === "shelter") shelterNodes.push(node);
        else towerNodes.push(node);
      });

      myDiagram.startTransaction("enforce location-based hierarchy");
      try {
        let currentLayer = 0;

        if (shelterNodes.length > 0) {
          shelterNodes.forEach((node) => {
            myDiagram.model.setDataProperty(node.data, "layer", currentLayer);
          });
          currentLayer++;
        }

        if (towerNodes.length > 0) {
          const sortedTowerNodes = towerNodes.sort((a, b) => {
            const categoryOrder = { "filter": 0, "radio": 1, "other": 2 };
            const aCat = categoryOrder[a.data.category] || categoryOrder.other;
            const bCat = categoryOrder[b.data.category] || categoryOrder.other;
            return aCat - bCat;
          });

          let towerLayer = currentLayer;
          let lastCategory = null;
          sortedTowerNodes.forEach((node) => {
            if (lastCategory && node.data.category !== lastCategory) towerLayer++;
            myDiagram.model.setDataProperty(node.data, "layer", towerLayer);
            lastCategory = node.data.category;
          });
          currentLayer = towerLayer + 1;
        }

        if (antennaNodes.length > 0) {
          antennaNodes.forEach((node, index) => {
            myDiagram.model.setDataProperty(node.data, "layer", currentLayer);
            myDiagram.model.setDataProperty(node.data, "column", index);
          });
        }

        myDiagram.commitTransaction("enforce location-based hierarchy");
        setTimeout(() => positionSeparatorBetweenLocations(), 50);
      } catch (e) {
        myDiagram.rollbackTransaction();
        throw e;
      }
    }

    function analyzeLinkConnections() {
      // IMPORTANT:
      // The original implementation inferred "layers" from node.location.y and then counted
      // outgoing links between consecutive layers. That made spacing depend on a prior layout pass.
      // After switching to ALL mode (where we intentionally set a no-op layout), node locations may
      // not reflect meaningful layers at the time this runs, causing maxSourceOutgoing=0 → spacing=180.
      //
      // To make spacing stable across SINGLE and ALL (and after mode switches), compute max outgoing
      // links per source directly from the model. This matches how curviness is computed (per source).
      if (!myDiagram || !myDiagram.model) {
        return { maxParallelLinks: 0, layerConnections: new Map(), maxSourceOutgoing: 0 };
      }

      const links = (myDiagram.model.linkDataArray || []);
      if (!links.length) {
        return { maxParallelLinks: 0, layerConnections: new Map(), maxSourceOutgoing: 0 };
      }

      const outgoingCounts = new Map(); // fromKey -> count
      for (const l of links) {
        if (!l) continue;
        if (typeof l.from === "undefined" || l.from === null) continue;
        // Treat each link as an outgoing edge from `from` (matches GoJS GraphLinksModel semantics).
        const k = String(l.from);
        outgoingCounts.set(k, (outgoingCounts.get(k) || 0) + 1);
      }

      let maxSourceOutgoing = 0;
      outgoingCounts.forEach((count) => {
        if (count > maxSourceOutgoing) maxSourceOutgoing = count;
      });

      return { maxParallelLinks: 0, layerConnections: new Map(), maxSourceOutgoing };
    }

    function calculateDynamicLayerSpacing() {
      const analysis = analyzeLinkConnections();
      const maxSourceOutgoing = analysis.maxSourceOutgoing;
      if (maxSourceOutgoing === 0) return 180;

      const curvinessStep = 20;
      const maxCurviness = maxSourceOutgoing > 0 ? (maxSourceOutgoing - 1) * curvinessStep : 0;
      const safetyMargin = 100;
      const nodeHeight = 60;
      const requiredSpace = (maxCurviness * 2) + safetyMargin + nodeHeight;
      const minSpacing = 180;
      return Math.max(minSpacing, requiredSpace);
    }

     // Mount position helpers (e.g. "1L", "1R") used for stable antenna ordering/column assignment.
    // Note: these are intentionally side-effect free and safe to call with null/undefined/invalid values.
    function parseMountPosition(pos) {
      const raw = (pos == null ? "" : String(pos)).trim();
      if (!raw) return null;

      // If comma-separated, use the first non-empty token.
      const firstToken = raw.split(",").map(s => s.trim()).find(Boolean);
      if (!firstToken) return null;

      const normalized = firstToken.toUpperCase().replace(/\s+/g, "");
      const m = normalized.match(/^(\d+)([LR])?$/);
      if (!m) return null;

      const slotNumber = parseInt(m[1], 10);
      if (!Number.isFinite(slotNumber) || slotNumber <= 0) return null;

      const side = (m[2] === "L" || m[2] === "R") ? m[2] : null;
      return { slotNumber, side };
    }

    function antennaColumnIndex(pos) {
      const parsed = parseMountPosition(pos);
      if (!parsed) return null;

      const base = (parsed.slotNumber - 1) * 2;
      // Treat missing side as left (keeps a stable index while remaining tolerant of data quality).
      return parsed.side === "R" ? base + 1 : base;
    }

    function createAntennaAwareLayout() {
      const $ = go.GraphObject.make;

      const baseLayout = $(go.LayeredDigraphLayout, {
        direction: 90,
        layerSpacing: calculateDynamicLayerSpacing(),
        columnSpacing: 50,
        packOption: go.LayeredDigraphLayout.PackExpand,
        setsPortSpots: false,
        initializeOption: go.LayeredDigraphLayout.InitDepthFirstOut,
        aggressiveOption: go.LayeredDigraphLayout.AggressiveLess

      const originalAssignLayers = baseLayout.assignLayers;
      baseLayout.assignLayers = function() {
        const result = originalAssignLayers.call(this);
        const network = this.network;
        if (network) {
          const shelterNodes = [];
          const towerNodes = [];
          const antennaNodes = [];
          const separatorNodes = [];

          network.vertexes.each(function(vertex) {
            const node = vertex.node;
            if (!node) return;
            if (node.data.category === "separator") separatorNodes.push(vertex);
            else if (node.data.category === "antenna") antennaNodes.push(vertex);
            else if (node.data.location === "shelter") shelterNodes.push(vertex);
            else towerNodes.push(vertex);
          });

          let currentLayer = 0;

          if (shelterNodes.length > 0) {
            const shelterLayers = shelterNodes.map(v => (typeof v.layer === "number" ? v.layer : 0));
            const minShelterLayer = Math.min(...shelterLayers);
            shelterNodes.forEach(function(vertex) {
              const baseLayer = (typeof vertex.layer === "number" ? vertex.layer : 0);
              vertex.layer = (baseLayer - minShelterLayer) + currentLayer;
            });
            currentLayer = Math.max(...shelterNodes.map(v => (typeof v.layer === "number" ? v.layer : 0))) + 1;
          }

          if (towerNodes.length > 0) {
            const towerLayers = towerNodes.map(v => (typeof v.layer === "number" ? v.layer : 0));
            const minTowerLayer = Math.min(...towerLayers);
            towerNodes.forEach(function(vertex) {
              const baseLayer = (typeof vertex.layer === "number" ? vertex.layer : 0);
              vertex.layer = (baseLayer - minTowerLayer) + currentLayer;
            });
            currentLayer = Math.max(...towerNodes.map(v => (typeof v.layer === "number" ? v.layer : 0))) + 1;
          }

          const antennaLayer = currentLayer;
          antennaNodes.forEach(function(vertex, index) {
            vertex.layer = antennaLayer;
            vertex.column = index;
          });
        }

        return result;
      };

      return baseLayout;
    }

    function getParallelLinkCurviness(link) {
      const fromNode = link.fromNode;
      const toNode = link.toNode;
      if (!fromNode || !toNode) return 0;

      const sourceNodeKey = fromNode.key;
      const allLinksFromSameSource = [];
      myDiagram.links.each(function(l) {
        if (l.fromNode && l.fromNode.key === sourceNodeKey) allLinksFromSameSource.push(l);
      });

      if (allLinksFromSameSource.length <= 1) return 0;

      function numericSuffix(key) {
        const s = String(key || "");
        const m = s.match(/(\d+)/g);
        if (!m || !m.length) return null;
        const n = parseInt(m[m.length - 1], 10);
        return Number.isFinite(n) ? n : null;
      }

      allLinksFromSameSource.sort((a, b) => {
        const aNum = numericSuffix(a.toNode && a.toNode.key);
        const bNum = numericSuffix(b.toNode && b.toNode.key);
        if (aNum !== null && bNum !== null && aNum !== bNum) return aNum - bNum;
        const aKey = String(a.toNode && a.toNode.key || "");
        const bKey = String(b.toNode && b.toNode.key || "");
        if (aKey !== bKey) return aKey.localeCompare(bKey);
        return (a.data.toPort || "").localeCompare(b.data.toPort || "");
      });

      const linkIndex = allLinksFromSameSource.indexOf(link);
      if (linkIndex === -1) return 0;

      const curvinessStep = 20;
      const curviness = linkIndex * curvinessStep;
      const isRightward = toNode.location.x > fromNode.location.x;
      return isRightward ? -Math.abs(curviness) : Math.abs(curviness);
    }

    function precomputeCurvinessValues() {
      if (!myDiagram || !myDiagram.model) return;

      myDiagram.links.each(function(link) {
        const sourceCurviness = getParallelLinkCurviness(link);
        myDiagram.model.setDataProperty(link.data, "sourceCurviness", sourceCurviness);
      });

      const targetNodeGroups = new Map();
      myDiagram.links.each(function(link) {
        const toKey = link.toNode && link.toNode.key;
        if (!toKey) return;
        if (!targetNodeGroups.has(toKey)) targetNodeGroups.set(toKey, []);
        targetNodeGroups.get(toKey).push(link);
      });

      targetNodeGroups.forEach((links) => {
        if (links.length <= 1) return;

        const curvinessMap = new Map();
        links.forEach(link => {
          const c = link.data.sourceCurviness;
          if (!curvinessMap.has(c)) curvinessMap.set(c, []);
          curvinessMap.get(c).push(link);
        });

        let hasConflicts = false;
        curvinessMap.forEach((linksWithSameCurviness) => {
          if (linksWithSameCurviness.length > 1) {
            const sources = new Set();
            linksWithSameCurviness.forEach(l => sources.add(l.fromNode && l.fromNode.key));
            if (sources.size > 1) hasConflicts = true;
          }
        });

        if (hasConflicts) {
          links.sort((a, b) => {
            const aNodeKey = parseInt(a.fromNode.key, 10);
            const bNodeKey = parseInt(b.fromNode.key, 10);
            if (aNodeKey !== bNodeKey) return aNodeKey - bNodeKey;
            return (a.data.fromPort || "").localeCompare(b.data.fromPort || "");
          });

          links.forEach((link, index) => {
            const curvinessStep = 20;
            const curviness = index * curvinessStep;
            const isRightward = link.toNode.location.x > link.fromNode.location.x;
            const finalCurviness = isRightward ? -Math.abs(curviness) : Math.abs(curviness);
            myDiagram.model.setDataProperty(link.data, "resolvedCurviness", finalCurviness);
          });
        } else {
          links.forEach(link => {
            myDiagram.model.setDataProperty(link.data, "resolvedCurviness", undefined);
          });
        }
      });
    }

    function analyzeLayerSkippingLinks() {
      if (!myDiagram || !myDiagram.model) return { directLinks: [], layerSkippingLinks: [] };

      const nodeLayerMap = new Map();
      const layerTolerance = 50;
      const layerGroups = [];

      myDiagram.nodes.each(function(node) {
        if (!node.location || node.data.category === "separator") return;
        const nodeY = node.location.y;

        let assignedLayer = -1;
        for (let i = 0; i < layerGroups.length; i++) {
          const layerY = layerGroups[i].avgY;
          if (Math.abs(nodeY - layerY) <= layerTolerance) {
            assignedLayer = i;
            layerGroups[i].nodes.push(node);
            layerGroups[i].avgY = layerGroups[i].nodes.reduce((sum, n) => sum + n.location.y, 0) / layerGroups[i].nodes.length;
            break;
          }
        }

        if (assignedLayer === -1) {
          assignedLayer = layerGroups.length;
          layerGroups.push({ layer: assignedLayer, avgY: nodeY, nodes: [node] });
        }

        nodeLayerMap.set(node.key, assignedLayer);
      });

      layerGroups.sort((a, b) => a.avgY - b.avgY);
      layerGroups.forEach((group, index) => {
        group.layer = index;
        group.nodes.forEach(node => {
          nodeLayerMap.set(node.key, index);
          if (node.data.layer !== index) myDiagram.model.setDataProperty(node.data, "layer", index);
        });
      });

      const directLinks = [];
      const layerSkippingLinks = [];

      myDiagram.links.each(function(link) {
        const fromNode = link.fromNode;
        const toNode = link.toNode;
        if (!fromNode || !toNode) return;
        const fromLayer = nodeLayerMap.get(fromNode.key);
        const toLayer = nodeLayerMap.get(toNode.key);
        if (fromLayer === undefined || toLayer === undefined) return;

        const layerDifference = Math.abs(fromLayer - toLayer);
        const info = {
          fromLayer, toLayer,
          layerDifference
        };
        if (layerDifference <= 1) directLinks.push(info);
        else layerSkippingLinks.push({ ...info, skippedLayers: layerDifference - 1 });
      });

      return { directLinks, layerSkippingLinks, layerGroups, nodeLayerMap };
    }

    function setLinkRoutingStrategy(strategy) {
      const $ = go.GraphObject.make;

      // Currently only one strategy used by the standalone renderer.
      // Keeping switch for protocol compatibility / future extension.
      switch (strategy) {

            $(go.Link,
              {
                routing: go.Link.AvoidsNodes,
                corner: 10,
                curve: go.Link.JumpOver,

                resegmentable: false,

                const toLayer = link && link.toNode && link.toNode.data && link.toNode.data.layer;
                const skipped = (typeof fromLayer === "number" && typeof toLayer === "number")
                  ? Math.max(0, Math.abs(fromLayer - toLayer) - 1)
                  : 0;
                return 40 + Math.abs(c) + (skipped * 20);

              new go.Binding("curviness", "", function(data, link) {
