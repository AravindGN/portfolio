                  stroke: "black",
                  background: "white",
                  segmentIndex: 0,
                  segmentFraction: 0.5,
                  visible: false
                },
                new go.Binding("text", "label"),
                new go.Binding("visible", "showLabel")
              )
            );
          break;
      }
    }

    function applyCurrentRoutingStrategy() {
      const currentStrategy = "avoidsNodes";
      precomputeCurvinessValues();
      const layerAnalysis = analyzeLayerSkippingLinks();
      myDiagram.layerAnalysis = layerAnalysis;
      setLinkRoutingStrategy(currentStrategy);

      setTimeout(() => {
        if (!myDiagram) return;
        myDiagram.links.each(function(link) {
          link.invalidateRoute();
        });
        if (myRouter) myRouter.invalidateRouter();
        myDiagram.requestUpdate();
      }, 0);
    }

    function applyCurrentLayout() {
      const antennaAwareLayout = createAntennaAwareLayout();
      if (antennaAwareLayout) myDiagram.layout = antennaAwareLayout;

      myDiagram.nodes.each(function(node) {
        myDiagram.model.setDataProperty(node.data, "loc", "");
      });

      myDiagram.invalidateDocumentBounds();
      myDiagram.layoutDiagram(true);

      setTimeout(() => {
        enforceAntennaBottomLayer();
        setTimeout(() => positionSeparatorBetweenLocations(), 50);
      }, 150);

      setTimeout(() => myDiagram.zoomToFit(), 200);
    }

    function positionSeparatorBetweenLocations() {
      if (!myDiagram || !myDiagram.model) return;

      const separatorNodes = [];
      const towerNodes = [];
      const shelterNodes = [];

      myDiagram.nodes.each(function(node) {
        if (!node.location || isNaN(node.location.x) || isNaN(node.location.y)) return;
        if (node.data.category === "separator") separatorNodes.push(node);
        else if (node.data.location === "shelter") shelterNodes.push(node);
        else if (node.data.category !== "antenna") towerNodes.push(node);
      });

      if (separatorNodes.length === 0) return;

      let alignmentX = null;
      if (towerNodes.length > 0) {
        const xs = towerNodes.map(n => n.location.x).filter(x => !isNaN(x));
        if (xs.length > 0) alignmentX = xs.reduce((s, x) => s + x, 0) / xs.length;
      }
      if (alignmentX === null && shelterNodes.length > 0) {
        const xs = shelterNodes.map(n => n.location.x).filter(x => !isNaN(x));
        if (xs.length > 0) alignmentX = xs.reduce((s, x) => s + x, 0) / xs.length;
      }
      if (alignmentX === null) alignmentX = myDiagram.documentBounds.centerX;

      let separatorY = null;
      if (shelterNodes.length > 0 && towerNodes.length > 0) {
        const towerBottomY = Math.max(...towerNodes.map(n => n.location.y));
        const shelterTopY = Math.min(...shelterNodes.map(n => n.location.y));
        const upper = Math.min(towerBottomY, shelterTopY);
        const lower = Math.max(towerBottomY, shelterTopY);
        separatorY = (upper + lower) / 2;
      } else if (shelterNodes.length === 0 && towerNodes.length > 0) {
        const lastTowerY = Math.max(...towerNodes.map(n => n.location.y));
        separatorY = lastTowerY + 100;
      } else if (shelterNodes.length > 0 && towerNodes.length === 0) {
        const lastShelterY = Math.max(...shelterNodes.map(n => n.location.y));
        separatorY = lastShelterY + 50;
      } else {
        separatorY = 0;
      }

      myDiagram.startTransaction("position separator between locations");
      try {
        separatorNodes.forEach((separatorNode) => {
          const newLocation = new go.Point(alignmentX, separatorY);
          myDiagram.model.setDataProperty(separatorNode.data, "loc", go.Point.stringify(newLocation));
          separatorNode.location = newLocation;
        });
        myDiagram.commitTransaction("position separator between locations");
      } catch (e) {
        myDiagram.rollbackTransaction();
        throw e;
      }
    }

    // ------------------------------
    // Data loading (ported)
    // ------------------------------
    function getLocationFromPayload(uniqueId, nodeName, nodeCategory) {
      if (!originalRequestPayload) return "tower";

      try {
        const content = JSON.parse(originalRequestPayload.input.messages[0].content);
        const projectData = content.projectData || {};
        const equipmentTypes = ["Antenna", "SpareAntenna", "Radio", "Filter", "OVP", "BBU"];

        for (const type of equipmentTypes) {
          const equipmentArray = projectData[type];
          if (!equipmentArray) continue;
          for (const equipment of equipmentArray) {
            if (equipment.unique_id === uniqueId) {
              const loc = equipment.locations || equipment.location || "tower";
              return String(loc).toLowerCase();
            }
            if (nodeName && (equipment.model === nodeName || equipment.orderable_name === nodeName || equipment.stencil_name === nodeName)) {
              const loc = equipment.locations || equipment.location || "tower";
              return String(loc).toLowerCase();
            }
            if (nodeCategory && equipment.type && String(nodeCategory).toLowerCase() === String(equipment.type).toLowerCase()) {
              const loc = equipment.locations || equipment.location || "tower";
              return String(loc).toLowerCase();
            }
          }
        }

        if (nodeCategory && String(nodeCategory).toLowerCase() === "bbu") return "shelter";
        if (nodeCategory && String(nodeCategory).toLowerCase() === "antenna") return "tower";
        return "tower";
      } catch (e) {
        return "tower";
      }
    }

    async function loadDiagramDataIntoGoJS(sectorDiagram, projectNumber, sectorKey) {
      if (!myDiagram) throw new Error("Diagram not initialized");

      resetExportReady();

      let nodeData, linkData;
      if (sectorDiagram.gojsNodes && sectorDiagram.gojsLinks) {
        nodeData = sectorDiagram.gojsNodes;
        linkData = sectorDiagram.gojsLinks;
      } else if (sectorDiagram.nodeDataArray && sectorDiagram.linkDataArray) {
        nodeData = sectorDiagram.nodeDataArray;
        linkData = sectorDiagram.linkDataArray;
      } else {
        throw new Error("Invalid diagram format: missing node or link data");
      }

      const transformedNodes = nodeData.map(node => {
        let leftArray = [];
        let rightArray = [];
        let topArray = [];
        let bottomArray = [];

        if (node.ports && typeof node.ports === "object") {
          leftArray = node.ports.left || [];
          rightArray = node.ports.right || [];
          topArray = node.ports.top || [];
          bottomArray = node.ports.bottom || [];
        } else {
          leftArray = node.leftArray || [];
          rightArray = node.rightArray || [];
          topArray = node.topArray || [];
          bottomArray = node.bottomArray || [];
        }

        const ensurePortSizes = (portArray) => (portArray || []).map(port => ({
          ...port,
          width: port.width || 12,
          height: port.height || 12
        }));

        leftArray = ensurePortSizes(leftArray);
        rightArray = ensurePortSizes(rightArray);
        topArray = ensurePortSizes(topArray);
        bottomArray = ensurePortSizes(bottomArray);

        const responseLocationRaw = (node.location || node.locations || "").toString().trim().toLowerCase();
        const responseLocation = (responseLocationRaw === "shelter" || responseLocationRaw === "tower") ? responseLocationRaw : "";

        const location =
          responseLocation ||
          getLocationFromPayload(node.unique_id || node.key, node.text || node.name, node.category);
         
        // Preserve antenna mount position (used later for slot ordering / labels).
        // Normalized onto `position` regardless of whether upstream uses `position`, `antennaPosition`, or `mountPosition`.
        let position = "";
        try {
          position = String(node.position ?? node.antennaPosition ?? node.mountPosition ?? "").trim();
        } catch (e) {
          position = "";
        }

        // If the API provides explicit diagram locations, preserve them.
        // NOTE: Do not confuse node.location/location*s* ("tower"/"shelter") with node.loc ("x y").
        let loc = undefined;
        try {
          if (node && typeof node.loc === "string" && node.loc.trim()) loc = node.loc.trim();
          else if (node && typeof node.loc === "object" && node.loc && isFinite(node.loc.x) && isFinite(node.loc.y)) {
            loc = go.Point.stringify(new go.Point(node.loc.x, node.loc.y));
          } else if (node && isFinite(node.x) && isFinite(node.y)) {
            loc = go.Point.stringify(new go.Point(Number(node.x), Number(node.y)));
          }
        } catch (e) {
          loc = undefined;
        }

        return {
          key: node.key,
          name: node.text || node.name || "Equipment",
          color: node.color || "#e1f5fe",
          category: node.category,
          location: location,
          position: position,
          unique_id: node.unique_id,
          loc: loc,
          leftArray,
          rightArray,
          topArray,
          bottomArray
        };
      });

      transformedNodes.push({
        key: "SEPARATOR_LINE",
        category: "separator",
        name: "Tower/Shelter Separator"
      });

      const transformedLinks = linkData.map(link => ({
        from: link.to,
        to: link.from,
        fromPort: link.toPort,
        toPort: link.fromPort,
        label: link.label || link.text || "",
        color: link.color || "#333",
        thickness: link.thickness || 2,
        category: link.category || "",
        sourceBand: link.sourceBand || "",
        targetBand: link.targetBand || "",
        connectionType: link.connectionType || ""
      }));

      const newModel = new go.GraphLinksModel(transformedNodes, transformedLinks);
      newModel.linkFromPortIdProperty = "fromPort";
      newModel.linkToPortIdProperty = "toPort";
      myDiagram.model = newModel;
      // Model swap resets undo enablement; re-enable so iframe UNDO/REDO works in edit mode.
      ensureUndoEnabled();
      setTimeout(() => { try { markExportReadyIfPossible(); } catch (e) {} }, 0);

      setTimeout(() => {
        applyCurrentLayout();
        scheduleLegendPositioning();
        setTimeout(() => {
          applyCurrentRoutingStrategy();
          scheduleLegendPositioning();
        }, 200);
      }, 100);
    }

    function getSectorDisplayName(sectorKey) {
      const k = String(sectorKey || "").trim().toUpperCase();
      return SECTOR_NAME_MAP[k] ? `${SECTOR_NAME_MAP[k]} (${k})` : k;
    }

    function computeContentBoundsForSingleSectorLabel() {
      if (!myDiagram) return null;
      let r = null;
      myDiagram.nodes.each(function(node) {
        if (!node || !node.data) return;
        const cat = node.data.category;
        if (cat === "sectorLabel" || cat === "sectorDivider") return;
        // Ignore nodes without measurable bounds
        const b = node.actualBounds;
        if (!b || !isFinite(b.width) || !isFinite(b.height) || b.width <= 0 || b.height <= 0) return;
        r = r ? r.unionRect(b) : b.copy();
      });
      return r || myDiagram.documentBounds;
    }

    function upsertSingleSectorLabel(sectorKey) {
      if (!myDiagram || !myDiagram.model) return;

      const key = String(sectorKey || "").trim().toUpperCase();
      const isAll = (key === "ALL");

      myDiagram.startTransaction("single sector label");
      try {
        const existing = myDiagram.model.findNodeDataForKey(SINGLE_SECTOR_LABEL_KEY);

        // In ALL mode, remove any single-sector label to avoid duplication.
        if (!key || isAll) {
          if (existing) myDiagram.model.removeNodeData(existing);
          myDiagram.commitTransaction("single sector label");
          return;
        }

        // Position label at top-center of the rendered content.
        myDiagram.invalidateDocumentBounds();
        const b = computeContentBoundsForSingleSectorLabel();
        if (!b || !isFinite(b.x) || !isFinite(b.y)) {
          myDiagram.commitTransaction("single sector label");
          return;
        }

        const labelLoc = go.Point.stringify(new go.Point(b.centerX, b.y - SINGLE_SECTOR_LABEL_Y_GAP));
        const labelText = getSectorDisplayName(key);

        if (existing) {
          myDiagram.model.setDataProperty(existing, "category", "sectorLabel");
          myDiagram.model.setDataProperty(existing, "text", labelText);
          myDiagram.model.setDataProperty(existing, "loc", labelLoc);
        } else {
          myDiagram.model.addNodeData({
            key: SINGLE_SECTOR_LABEL_KEY,
            category: "sectorLabel",
            text: labelText,
            loc: labelLoc
          });
        }

        myDiagram.commitTransaction("single sector label");
      } catch (e) {
        myDiagram.rollbackTransaction();
        throw e;
      }
    }

    function parseLocMaybe(loc) {
      if (typeof loc !== "string") return null;
      const s = loc.trim();
      if (!s) return null;
      try {
        const p = go.Point.parse(s);
        if (!p || !isFinite(p.x) || !isFinite(p.y)) return null;
        return p;
      } catch (e) {
        return null;
      }
    }

    function computeBoundsFromNodes(nodeDatas) {
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;

      for (const n of (nodeDatas || [])) {
        if (!n || n.category === "sectorLabel" || n.category === "sectorDivider") continue;

        const p = parseLocMaybe(n.loc);
        if (!p) continue;

        // NEW: account for node visual size captured during snapshot
        const w = Number(n.__w);
        const h = Number(n.__h);
        const halfW = (isFinite(w) && w > 0) ? (w / 2) : 0;
        const halfH = (isFinite(h) && h > 0) ? (h / 2) : 0;

        minX = Math.min(minX, p.x - halfW);
        maxX = Math.max(maxX, p.x + halfW);
        minY = Math.min(minY, p.y - halfH);
        maxY = Math.max(maxY, p.y + halfH);
      }

      if (!isFinite(minX) || !isFinite(maxX) || !isFinite(minY) || !isFinite(maxY)) {
        return { minX: 0, maxX: 0, minY: 0, maxY: 0, hasAny: false };
      }
      return { minX, maxX, minY, maxY, hasAny: true };
    }

    function shiftNodeLoc(nodeData, dx, dy) {
      const p = parseLocMaybe(nodeData && nodeData.loc);
      if (!p) return nodeData;
      const np = new go.Point(p.x + dx, p.y + dy);
      return { ...nodeData, loc: go.Point.stringify(np) };
    }

    function computeTowerShelterSeparatorLocForNodes(nodeDatas) {
      const tower = [];
      const shelter = [];

      for (const n of (nodeDatas || [])) {
        if (!n) continue;
        if (n.category === "separator") continue;
        const p = parseLocMaybe(n.loc);
        if (!p) continue;
        if (n.location === "shelter") shelter.push(p);
        else if (n.category !== "antenna") tower.push(p);
      }

      const avgX = (pts) => pts.reduce((s, p) => s + p.x, 0) / pts.length;
      const maxY = (pts) => Math.max(...pts.map(p => p.y));
      const minY = (pts) => Math.min(...pts.map(p => p.y));

      let alignmentX = null;
      if (tower.length) alignmentX = avgX(tower);
      else if (shelter.length) alignmentX = avgX(shelter);
      else alignmentX = 0;

      let separatorY = 0;
      if (shelter.length && tower.length) {
        const towerBottomY = maxY(tower);
        const shelterTopY = minY(shelter);
        const upper = Math.min(towerBottomY, shelterTopY);
        const lower = Math.max(towerBottomY, shelterTopY);
        separatorY = (upper + lower) / 2;
      } else if (!shelter.length && tower.length) {
        separatorY = maxY(tower) + 100;
      } else if (shelter.length && !tower.length) {
        separatorY = maxY(shelter) + 50;
      }

      return new go.Point(alignmentX, separatorY);
    }

    function extractSectorNodesAndLinks(sectorDiagram) {
      if (!sectorDiagram) throw new Error("Invalid sector diagram");
      if (sectorDiagram.gojsNodes && sectorDiagram.gojsLinks) {
        return { nodeData: sectorDiagram.gojsNodes, linkData: sectorDiagram.gojsLinks };
      }
      if (sectorDiagram.nodeDataArray && sectorDiagram.linkDataArray) {
        return { nodeData: sectorDiagram.nodeDataArray, linkData: sectorDiagram.linkDataArray };
      }
      throw new Error("Invalid diagram format: missing node or link data");
    }

    function deepCloneJson(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function runLayoutForSnapshot() {
      if (!myDiagram || !myDiagram.model) return;

      const antennaAwareLayout = createAntennaAwareLayout();
      if (antennaAwareLayout) myDiagram.layout = antennaAwareLayout;

      myDiagram.nodes.each(function(node) {
        try { myDiagram.model.setDataProperty(node.data, "loc", ""); } catch (e) {}
      });

      myDiagram.invalidateDocumentBounds();
      myDiagram.layoutDiagram(true);

      try { positionSeparatorBetweenLocations(); } catch (e) {}

      // Persist computed locations + sizes back into model data so ALL-mode can offset by sector.
      myDiagram.nodes.each(function(node) {
        if (!node || !node.data) return;

        // loc
        if (node.location && isFinite(node.location.x) && isFinite(node.location.y)) {
          try { myDiagram.model.setDataProperty(node.data, "loc", go.Point.stringify(node.location)); } catch (e) {}
        }

        // NEW: size (so ALL bounds/dividers include wide nodes like OVP)
        try {
          node.ensureBounds();
          const b = node.actualBounds;
          if (b && isFinite(b.width) && isFinite(b.height) && b.width > 0 && b.height > 0) {
            myDiagram.model.setDataProperty(node.data, "__w", b.width);
            myDiagram.model.setDataProperty(node.data, "__h", b.height);
          }
        } catch (e) {}
      });
    }

    function getLaidOutSectorSnapshotForAll(sectorDiagram) {
      if (!myDiagram) throw new Error("Diagram not initialized");

      const { nodeData, linkData } = extractSectorNodesAndLinks(sectorDiagram);

      // Build a per-sector model using the same transformation as single-sector mode.
      const transformedNodes = (nodeData || []).map(node => {
        let leftArray = [];
        let rightArray = [];
        let topArray = [];
        let bottomArray = [];

        if (node.ports && typeof node.ports === "object") {
          leftArray = node.ports.left || [];
          rightArray = node.ports.right || [];
          topArray = node.ports.top || [];
          bottomArray = node.ports.bottom || [];
        } else {
          leftArray = node.leftArray || [];
          rightArray = node.rightArray || [];
          topArray = node.topArray || [];
          bottomArray = node.bottomArray || [];
        }

        const ensurePortSizes = (portArray) => (portArray || []).map(port => ({
          ...port,
          width: port.width || 12,
          height: port.height || 12
        }));

        leftArray = ensurePortSizes(leftArray);
        rightArray = ensurePortSizes(rightArray);
        topArray = ensurePortSizes(topArray);
        bottomArray = ensurePortSizes(bottomArray);

        const responseLocationRaw = (node.location || node.locations || "").toString().trim().toLowerCase();
        const responseLocation = (responseLocationRaw === "shelter" || responseLocationRaw === "tower") ? responseLocationRaw : "";
        const location =
          responseLocation ||
          getLocationFromPayload(node.unique_id || node.key, node.text || node.name, node.category);

        // Preserve antenna mount position (used later for slot ordering / labels).
        // Normalized onto `position` regardless of whether upstream uses `position`, `antennaPosition`, or `mountPosition`.
        let position = "";
        try {
          position = String(node.position ?? node.antennaPosition ?? node.mountPosition ?? "").trim();
        } catch (e) {
          position = "";
        }

        // Preserve explicit loc if present, otherwise layout will compute it.
        let loc = undefined;
        try {
          if (node && typeof node.loc === "string" && node.loc.trim()) loc = node.loc.trim();
          else if (node && typeof node.loc === "object" && node.loc && isFinite(node.loc.x) && isFinite(node.loc.y)) {
            loc = go.Point.stringify(new go.Point(node.loc.x, node.loc.y));
          } else if (node && isFinite(node.x) && isFinite(node.y)) {
            loc = go.Point.stringify(new go.Point(Number(node.x), Number(node.y)));
          }
        } catch (e) {
          loc = undefined;
        }

        return {
          key: String(node.key),
          name: node.text || node.name || "Equipment",
          color: node.color || "#e1f5fe",
          category: node.category,
          location: location,
          position: position,
          unique_id: node.unique_id,
          isSharedEquipment: node.isSharedEquipment || false, // Preserve shared equipment flag
          loc: loc,
          leftArray,
          rightArray,
          topArray,
          bottomArray
        };
      });

      transformedNodes.push({
        key: "SEPARATOR_LINE",
        category: "separator",
        name: "Tower/Shelter Separator"
      });

      const transformedLinks = (linkData || []).map(link => ({
        from: String(link.to),
        to: String(link.from),
        fromPort: link.toPort,
        toPort: link.fromPort,
        label: link.label || link.text || "",
        color: link.color || "#333",
        thickness: link.thickness || 2,
        category: link.category || "",
        sourceBand: link.sourceBand || "",
        targetBand: link.targetBand || "",
        connectionType: link.connectionType || ""
      }));

      const m = new go.GraphLinksModel(transformedNodes, transformedLinks);
      m.linkFromPortIdProperty = "fromPort";
      m.linkToPortIdProperty = "toPort";
      myDiagram.model = m;

      // Synchronous layout snapshot: compute locs as in single-sector view.
      runLayoutForSnapshot();

      return {
        nodes: deepCloneJson(myDiagram.model.nodeDataArray || []),
        links: deepCloneJson(myDiagram.model.linkDataArray || [])
      };
    }

    async function buildCombinedAllSectorsModelAsync() {
      if (!lastParsedResult || !lastParsedResult.sectorDiagrams) throw new Error("No previous generation available");

      const sectorDiagrams = lastParsedResult.sectorDiagrams;
      const sectorKeys = Object.keys(sectorDiagrams)
        .map(k => String(k))
        .filter(k => sectorDiagrams[k] && sectorDiagrams[k].success)
        .sort((a, b) => a.localeCompare(b));

      if (!sectorKeys.length) throw new Error("No successful sectors available for ALL view");

      const combinedNodes = [];
      const combinedLinks = [];
      const sectorInfos = [];
      
      // Track shared equipment to ensure deduplication
      const sharedEquipmentMap = new Map(); // key -> node data
      const sharedEquipmentKeys = new Set(); // original keys of shared equipment
      const sharedEquipmentLayoutMap = new Map(); // key -> laid-out node data snapshot (includes loc + __w/__h)

      const SECTOR_SPACING = 800;
      const LABEL_Y_GAP = 180;

      let runningX = 0;

      // First pass: identify all shared equipment across sectors
      // IMPORTANT: Check nodeDataArray directly, not gojsNodes, as isSharedEquipment flag is in nodeDataArray
      for (const sectorKey of sectorKeys) {
        const sectorDiagram = sectorDiagrams[sectorKey];
        const rawNodeData = sectorDiagram.nodeDataArray || sectorDiagram.gojsNodes || [];
        
        for (const node of rawNodeData) {
          if (node && node.isSharedEquipment === true) {
            const nodeKey = String(node.key);
            if (!sharedEquipmentMap.has(nodeKey)) {
              sharedEquipmentMap.set(nodeKey, node);
              sharedEquipmentKeys.add(nodeKey);
            }
          }
        }
      }

      // Second pass: build combined diagram with deduplication
      for (const sectorKey of sectorKeys) {
        const sectorDiagram = sectorDiagrams[sectorKey];
        // Layout this sector first so ALL mode looks like the individual sector view.
        const snap = getLaidOutSectorSnapshotForAll(sectorDiagram);

        // Capture the laid-out shared equipment nodes (loc + size) from the full sector snapshot
        // BEFORE filtering them out of the per-sector render list. We'll render shared gear once later,
        // but using these stable per-sector layout results (prevents shared nodes snapping to (0,0) or drifting).
        try {
          for (const n of (snap.nodes || [])) {
            const k = String(n && n.key);
            if (!k) continue;
            if (!sharedEquipmentKeys.has(k)) continue;
            if (!sharedEquipmentLayoutMap.has(k)) {
              sharedEquipmentLayoutMap.set(k, deepCloneJson(n));
            }
          }
        } catch (e) {}

        // Prefix keys to avoid collisions, but NOT for shared equipment.
        // IMPORTANT: In ALL view we render a single, global Tower/Shelter separator line.
        // Remove per-sector separators so they don't end up at different Y positions.
        let nodes = (snap.nodes || [])
          .filter(n => !(n && n.category === "separator"))
          .filter(n => !sharedEquipmentKeys.has(String(n.key))) // Filter out shared equipment (will be added separately)
          .map(n => ({
            ...n,
            key: `${sectorKey}_${String(n.key)}`
          }));

        // Map links: preserve original keys for shared equipment, prefix for sector-specific
        const links = (snap.links || []).map(l => {
          const fromKey = String(l.from);
          const toKey = String(l.to);
          return {
            ...l,
            from: sharedEquipmentKeys.has(fromKey) ? fromKey : `${sectorKey}_${fromKey}`,
            to: sharedEquipmentKeys.has(toKey) ? toKey : `${sectorKey}_${toKey}`
          };
        });

        const bounds = computeBoundsFromNodes(nodes.filter(n => n.category !== "separator"));
        const dx = bounds.hasAny ? (runningX - bounds.minX) : runningX;

        // Shift all loc-aware nodes into their sector slot.
        nodes = nodes.map(n => shiftNodeLoc(n, dx, 0));

        const shiftedBounds = computeBoundsFromNodes(nodes.filter(n => n.category !== "separator"));
        const labelX = (shiftedBounds.minX + shiftedBounds.maxX) / 2;
        const labelY = shiftedBounds.minY - LABEL_Y_GAP;
        nodes.push({
          key: `__SECTOR_LABEL_${sectorKey}`,
          category: "sectorLabel",
          text: getSectorDisplayName(sectorKey),
          loc: go.Point.stringify(new go.Point(labelX, labelY))
        });

        combinedNodes.push(...nodes);
        combinedLinks.push(...links);
        sectorInfos.push({ sectorKey, bounds: shiftedBounds });

        runningX = shiftedBounds.maxX + SECTOR_SPACING;
      }
      
      // Add shared equipment nodes once (positioned in a shared area)
      if (sharedEquipmentMap.size > 0) {
        // Position shared equipment in the center.
        // IMPORTANT: Use the per-sector laid-out snapshot locations (loc) rather than laying out each shared node alone.
        // Laying out a single-node model often produces (0,0) (or otherwise unstable) positions and causes "shelter OVP"
        // to jump upward and overlap the tower OVP in ALL view.
        const globalMinX = Math.min(...sectorInfos.map(s => s.bounds.minX));
        const globalMaxX = Math.max(...sectorInfos.map(s => s.bounds.maxX));
        
        const centerX = (globalMinX + globalMaxX) / 2;

        // Pack shared nodes by their rendered width to avoid overlaps (OVPs can be ~6000px wide).
        const PAD_X = 120;
        const DEFAULT_W = 200;

        function getNodeWidth(n) {
          const w = Number(n && n.__w);
          const w2 = Number(n && n.width);
          if (isFinite(w) && w > 0) return w;
          if (isFinite(w2) && w2 > 0) return w2;
          return DEFAULT_W;
        }

        function median(nums) {
          const arr = (nums || []).filter(v => typeof v === "number" && isFinite(v)).sort((a, b) => a - b);
          if (!arr.length) return null;
          const mid = Math.floor(arr.length / 2);
          return (arr.length % 2) ? arr[mid] : ((arr[mid - 1] + arr[mid]) / 2);
        }

        // Group shared equipment by location so tower and shelter equipment don't collapse onto the same Y.
        // (This is the direct cause of "shelter OVP overlapping tower OVP" when both are shared.)
        const byLoc = new Map(); // "tower"|"shelter"|"" -> array of laid-out nodes
        for (const [nodeKey, _sharedNode] of sharedEquipmentMap) {
          const layoutNode = sharedEquipmentLayoutMap.get(String(nodeKey));
          if (!layoutNode) continue;
          const locStr = String(layoutNode.location || "").toLowerCase();
          const bucket = (locStr === "shelter" || locStr === "tower") ? locStr : "";
          if (!byLoc.has(bucket)) byLoc.set(bucket, []);
          byLoc.get(bucket).push({ nodeKey: String(nodeKey), layoutNode });
        }

        // Determine a stable per-location Y using the median of that location's original laid-out Y values.
        // This keeps shared tower OVP near tower band (e.g. y~5800) and shared shelter OVP near shelter band (e.g. y~6600).
        const rowYByLoc = new Map();
        byLoc.forEach((items, bucket) => {
          const ys = [];
          for (const it of items) {
            const p = parseLocMaybe(it.layoutNode && it.layoutNode.loc);
            if (p) ys.push(p.y);
          }
          rowYByLoc.set(bucket, median(ys));
        });

        function placePackedRow(items, y) {
          if (!items || !items.length) return;
          const withW = items.map(it => ({
            ...it,
            w: getNodeWidth(it.layoutNode)
          }));
          const totalW = withW.reduce((s, it) => s + it.w + PAD_X, 0);
          let xLeft = centerX - (totalW / 2);
          for (const it of withW) {
            const cx = xLeft + (it.w / 2);
            const newLoc = go.Point.stringify(new go.Point(cx, y));
            combinedNodes.push({
              ...it.layoutNode,
              key: it.nodeKey,           // Keep original key (no prefix)
              isSharedEquipment: true,   // Preserve flag
              loc: newLoc
            });
            xLeft += it.w + PAD_X;
          }
        }

        const towerItems = byLoc.get("tower") || [];
        const shelterItems = byLoc.get("shelter") || [];
        const otherItems = byLoc.get("") || [];

        // If we can't infer a location-specific Y, fall back to placing below all sector-specific content.
        const globalMaxY = Math.max(...sectorInfos.map(s => s.bounds.maxY));
        const fallbackBaseY = globalMaxY + 300;
        const towerY = (rowYByLoc.get("tower") != null) ? rowYByLoc.get("tower") : fallbackBaseY;
        const shelterY = (rowYByLoc.get("shelter") != null) ? rowYByLoc.get("shelter") : (fallbackBaseY + 500);
        const otherY = (rowYByLoc.get("") != null) ? rowYByLoc.get("") : (fallbackBaseY + 1000);

        placePackedRow(towerItems, towerY);
        placePackedRow(shelterItems, shelterY);
        placePackedRow(otherItems, otherY);
      }

      // Add vertical dotted separators between sectors.
      const globalMinY = Math.min(...sectorInfos.map(s => s.bounds.minY));
      const globalMaxY = Math.max(...sectorInfos.map(s => s.bounds.maxY));
      const dividerHeight = (globalMaxY - globalMinY) + 600;
      const dividerY = (globalMinY + globalMaxY) / 2;

      for (let i = 0; i < sectorInfos.length - 1; i++) {
        const left = sectorInfos[i];
        const x = left.bounds.maxX + (SECTOR_SPACING / 2);
        const rightKey = sectorInfos[i + 1].sectorKey;
        combinedNodes.push({
          key: `__SECTOR_DIVIDER_${left.sectorKey}_${rightKey}`,
          category: "sectorDivider",
          loc: go.Point.stringify(new go.Point(x, dividerY)),
          height: dividerHeight
        });
      }

      // Add ONE global Tower/Shelter separator line aligned across ALL sectors.
      // This fixes per-sector Y drift when sectors have different tower/shelter content extents.
      try {
        const contentNodes = (combinedNodes || []).filter(n =>
          n && n.category !== "sectorLabel" && n.category !== "sectorDivider"
        );

        const b = computeBoundsFromNodes(contentNodes);

        const towerYs = [];
        const shelterYs = [];
        for (const n of contentNodes) {
          if (!n) continue;
          const p = parseLocMaybe(n.loc);
          if (!p) continue;
          if (n.location === "shelter") shelterYs.push(p.y);
          else if (n.category !== "antenna") towerYs.push(p.y);
        }

        let separatorY = 0;
        if (towerYs.length && shelterYs.length) {
          const towerBottomY = Math.max(...towerYs);
          const shelterTopY = Math.min(...shelterYs);
          const upper = Math.min(towerBottomY, shelterTopY);
          const lower = Math.max(towerBottomY, shelterTopY);
          separatorY = (upper + lower) / 2;
        } else if (towerYs.length) {
          separatorY = Math.max(...towerYs) + 100;
        } else if (shelterYs.length) {
          separatorY = Math.max(...shelterYs) + 50;
        }

        const centerX = (b && b.hasAny) ? ((b.minX + b.maxX) / 2) : 0;
        const width = (b && b.hasAny) ? ((b.maxX - b.minX) + 600) : 2000;

        combinedNodes.push({
          key: "__GLOBAL_SEPARATOR_LINE__",
          category: "separator",
          loc: go.Point.stringify(new go.Point(centerX, separatorY)),
          width: width
        });
      } catch (e) {
        // best-effort; do not break ALL view if separator calc fails
      }

      const model = new go.GraphLinksModel(combinedNodes, combinedLinks);
      model.linkFromPortIdProperty = "fromPort";
      model.linkToPortIdProperty = "toPort";
      return { model, sectorKeys };
    }

    function pickSectorKey(sectorDiagrams, preferredKey) {
      if (!sectorDiagrams) return null;
      if (preferredKey && sectorDiagrams[preferredKey]) return preferredKey;
      if (sectorDiagrams["A"]) return "A";
      const keys = Object.keys(sectorDiagrams);
      return keys.length ? keys[0] : null;
    }

    async function callRunsWait(requestPayload) {
      const url = apiBaseUrl.replace(/\/+$/, "") + "/runs/wait";
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(requestPayload)
    });
      if (!response.ok) throw new Error(`Server responded with status: ${response.status}`);
      return await response.json();
    }

    function normalizeRunsWaitResult(data) {
      if (!data) return null;
      if (typeof data.result === "string") return JSON.parse(data.result);
      return data.result;
    }

    function buildRunsWaitPayload(msg) {
      if (msg && msg.requestPayload) return msg.requestPayload;

      // Default: build the same structure the standalone renderer used.
      // msg.content can be a stringified JSON object for "messages[0].content".
      const projectNumber = msg && msg.projectNumber ? String(msg.projectNumber) : "";
      const contentObj = msg && msg.content
        ? (typeof msg.content === "string" ? JSON.parse(msg.content) : msg.content)
        : {
            action: "generate-sector",
            projectNumber,
            projectData: msg && msg.projectData ? msg.projectData : {},
            preferences: msg && msg.preferences ? msg.preferences : {}
          };

      return {
        assistant_id: "plumbingtool",
        input: {
          messages: [
            {
              role: "human",
              content: JSON.stringify(contentObj)
            }
          ]
        }
      };
    }

    async function generateFromMessage(msg) {
      const seq = ++generateSeq;
      status("Generating diagram…");

      if (msg && msg.apiBaseUrl) apiBaseUrl = String(msg.apiBaseUrl);

      const payload = buildRunsWaitPayload(msg);
      originalRequestPayload = payload;

      const data = await callRunsWait(payload);
      if (seq !== generateSeq) return; // stale

      const parsed = normalizeRunsWaitResult(data);
      if (!parsed || !parsed.sectorDiagrams) throw new Error("Response does not contain sectorDiagrams");

      lastParsedResult = parsed;
      const sectorKey = pickSectorKey(parsed.sectorDiagrams, msg && msg.sectorKey);
      if (!sectorKey) throw new Error("No sector diagrams available in response");

      const sectorDiagram = parsed.sectorDiagrams[sectorKey];
      if (!sectorDiagram) throw new Error(`Sector "${sectorKey}" not found`);
      if (!sectorDiagram.success) throw new Error(`Sector "${sectorKey}" generation failed`);

      currentSectorKey = sectorKey;
      const projectNumber = (msg && msg.projectNumber) ? String(msg.projectNumber) : (parsed.summary && parsed.summary.projectNumber) || undefined;

      status(`Rendering sector ${sectorKey}…`);
      await loadDiagramDataIntoGoJS(sectorDiagram, projectNumber || "", sectorKey);

      postToParent({
        action: "GENERATED",
        availableSectors: (parsed.summary && parsed.summary.availableSectors) ? parsed.summary.availableSectors : Object.keys(parsed.sectorDiagrams),
        sectorKey,
        projectNumber
      });

      status(`Ready (sector ${sectorKey})`);
    }

    async function switchSector(sectorKey) {
      if (!lastParsedResult || !lastParsedResult.sectorDiagrams) {
        throw new Error("No previous generation available to switch sectors");
      }

      const key = String(sectorKey || "").trim().toUpperCase();
      if (key === "ALL") {
        currentSectorKey = "ALL";
        status("Rendering ALL sectors…");

        // Pre-layout each sector (same pipeline as single-sector) then offset side-by-side.
        const prevVisibility = (myDiagram && myDiagram.div) ? myDiagram.div.style.visibility : "";
        try {
          if (myDiagram && myDiagram.div) myDiagram.div.style.visibility = "hidden";
          const { model, sectorKeys } = await buildCombinedAllSectorsModelAsync();

          // Critical: disable auto-layout so explicit per-sector offsets (loc) are preserved.
          // NOTE: In GoJS 3.x, setting `diagram.layout = null` can throw. Use a no-op Layout instance instead.
          const noOpLayout = new go.Layout();
          noOpLayout.isInitial = false;
          noOpLayout.isOngoing = false;
          myDiagram.layout = noOpLayout;
          myDiagram.model = model;
          // Model swap resets undo enablement; re-enable so iframe UNDO/REDO works in edit mode.
          ensureUndoEnabled();
          resetExportReady();
          setTimeout(() => { try { markExportReadyIfPossible(); } catch (e) {} }, 0);

          // Route links without re-laying out nodes.
          setTimeout(() => {
            applyCurrentRoutingStrategy();
            try { myDiagram.zoomToFit(); } catch (e) {}
            try { scheduleLegendPositioning(); } catch (e) {}
          }, 0);

          status(`Ready (ALL: ${sectorKeys.join(", ")})`);
          return;
        } finally {
          if (myDiagram && myDiagram.div) myDiagram.div.style.visibility = prevVisibility || "visible";
        }
      }

      if (!key || !lastParsedResult.sectorDiagrams[key]) {
        throw new Error(`Sector "${sectorKey}" not available`);
      }
      const sectorDiagram = lastParsedResult.sectorDiagrams[key];
      if (!sectorDiagram.success) throw new Error(`Sector "${key}" generation failed`);

      currentSectorKey = key;
      status(`Switching to sector ${key}…`);
      await loadDiagramDataIntoGoJS(sectorDiagram, "", key);
      status(`Ready (sector ${key})`);
    }

    function exportModelJson() {
      if (!myDiagram || !myDiagram.model) throw new Error("Diagram/model not initialized");
      return myDiagram.model.toJson();
    }

    function importModelJson(modelJson) {
      if (!myDiagram) throw new Error("Diagram not initialized");
      const json = (typeof modelJson === "string") ? modelJson : JSON.stringify(modelJson);
      const model = go.Model.fromJson(json);
      // Ensure port props are correct even after import
      model.linkFromPortIdProperty = "fromPort";
      model.linkToPortIdProperty = "toPort";
      myDiagram.model = model;
      // Model swap resets undo enablement; re-enable so iframe UNDO/REDO works in edit mode.
      ensureUndoEnabled();
      myDiagram.delayInitialization(function() {
      try { applyCurrentRoutingStrategy(); } catch (e) {}
      try { myDiagram.zoomToFit(); } catch (e) {}
      try { scheduleLegendPositioning(); } catch (e) {}
    });
    }

    // ------------------------------
    // postMessage handler
    // ------------------------------
    window.addEventListener("message", async function(evt) {
      if (!evt || !evt.data) return;
      if (!isAllowedMessage(evt)) return;

      // Learn parent origin on first allowed message.
      if (!allowedParentOrigin && evt.origin && evt.origin !== "null") {
        allowedParentOrigin = evt.origin;
      }

      const msg = evt.data;
      const action = msg.action;
      if (!action) return;

      try {
        switch (action) {
          case "INIT": {
            if (msg.apiBaseUrl) apiBaseUrl = String(msg.apiBaseUrl);
            if (typeof msg.allowCrossOrigin === "boolean") allowCrossOrigin = msg.allowCrossOrigin;
            status("Ready");
            postToParent({ action: "READY" });
            break;
          }
          case "GENERATE": {
            await generateFromMessage(msg);
            break;
          }
          case "SWITCH_SECTOR": {
            await switchSector(String(msg.sectorKey || ""));
            // Notify parent only AFTER the sector switch completes to avoid races with
            // parent-side "apply edited model" logic.
            postToParent({ action: "SECTOR_READY", sectorKey: currentSectorKey || undefined });
            break;
          }
          case "SET_LEGEND_VISIBLE": {
            setLegendVisible(!!msg.visible);
            break;
          }
          case "GET_MODEL_JSON": {
            const modelJson = exportModelJson();
            postToParent({ action: "MODEL_JSON", requestId: msg.requestId, modelJson, sectorKey: currentSectorKey || undefined });
            break;
          }
          case "SET_MODEL_JSON": {
            importModelJson(msg.modelJson);
            status("Model loaded");
            // Acknowledge for parent request tracking (prevents parent-side timeouts on Cancel restore).
            postToParent({ action: "MODEL_SET", requestId: msg.requestId });
            break;
          }
          case "ZOOM_TO_FIT": {
            if (myDiagram) myDiagram.zoomToFit();
            break;
          }
          case "SET_EDIT_MODE": {
            applyEditMode(!!msg.enabled);
            // Ensure undo is enabled when entering edit mode; model swaps can disable it.
            if (!!msg.enabled) {
              try { ensureUndoEnabled(); } catch (e) {}
              // Start a clean undo stack for the edit session (optional but expected UX).
              try { myDiagram && myDiagram.undoManager && myDiagram.undoManager.clear(); } catch (e) {}
            }
            postToParent({ action: "EDIT_MODE_SET", requestId: msg.requestId, enabled: !!msg.enabled });
            break;
          }
          case "UNDO": {
            const r = safeUndo();
            postToParent({ action: "UNDO_RESULT", requestId: msg.requestId, ...r });
            break;
          }
          case "REDO": {
            const r = safeRedo();
            postToParent({ action: "REDO_RESULT", requestId: msg.requestId, ...r });
            break;
          }
          case "EXPORT_IMAGE_BLOB": {
            // Avoid exporting before layout/render completes (common reason for "legend only" exports).
            await waitForExportReady(60000);
            const out = exportImageDataUrl({ format: msg.format, background: msg.background, scale: msg.scale });
            postToParent({
              action: "EXPORTED_IMAGE_BLOB",
              requestId: msg.requestId,
              mimeType: out.mimeType,
              format: out.format,
              bytesBase64: dataUrlToBase64(out.dataUrl)
            });
            break;
          }
          case "EXPORT_SVG": {
            await waitForExportReady(60000);
            const svgString = exportSvgString({ background: msg.background, scale: msg.scale });
            postToParent({ action: "EXPORTED_SVG", requestId: msg.requestId, svgString });
            break;
          }
          case "DEBUG_LEGEND_STATUS": {
            const contentBounds = computeContentBoundsExcludingLegend();
            const documentBounds = myDiagram ? myDiagram.documentBounds : null;
            
            // Calculate rightmost node position for debugging
            let rightmostNodeX = Number.MIN_VALUE;
            let rightmostNodeInfo = '';
            myDiagram && myDiagram.nodes.each(function(node) {
              if (node === legendPart) return;
              node.ensureBounds();
              const bounds = node.actualBounds;
              if (bounds) {
                const nodeRight = bounds.x + bounds.width;
                if (nodeRight > rightmostNodeX) {
                  rightmostNodeX = nodeRight;
                  rightmostNodeInfo = `${node.data.name || node.key} at ${nodeRight}`;
                }
              }
            });
            
            const status = {
              legendExists: !!legendPart,
              legendVisible: legendPart ? legendPart.visible : false,
              legendPositioned: legendPositioned,
              legendLocation: legendPart ? `${legendPart.location.x}, ${legendPart.location.y}` : 'N/A',
              contentBounds: contentBounds ? `${contentBounds.width}x${contentBounds.height} at ${contentBounds.x},${contentBounds.y}` : 'N/A',
              contentRightEdge: contentBounds ? contentBounds.x + contentBounds.width : 'N/A',
              documentBounds: documentBounds ? `${documentBounds.width}x${documentBounds.height}` : 'N/A',
              rightmostNode: rightmostNodeInfo || 'N/A',
              gap: legendPart && contentBounds ? legendPart.location.x - (contentBounds.x + contentBounds.width) : 'N/A'
            };
            console.log('[iframe] Legend debug status:', status);
            postToParent({ action: "DEBUG_LEGEND_STATUS_RESULT", requestId: msg.requestId, status });
            break;
          }
          case "FORCE_LEGEND_REPOSITION": {
            legendPositioned = false;
            scheduleLegendPositioning();
            break;
          }
          default:
            // ignore unknown actions
            break;
        }
      } catch (e) {
        error(e && e.message ? e.message : String(e), e);
      }
    });

    // Boot
    document.addEventListener("DOMContentLoaded", function() {
      try {
        init();
        // Default to view-only until parent explicitly enables edit mode.
        try { applyEditMode(false); } catch (e) {}
        status("Ready");
        postToParent({ action: "READY" });
      } catch (e) {
        error("Failed to initialize iframe renderer", e);
      }
    });
  </script>
</body>
</html>
